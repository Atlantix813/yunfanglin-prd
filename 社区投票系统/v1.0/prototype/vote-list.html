<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>社区投票</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;background:#F4F8FF;color:#1F2937;font-size:14px;width:375px;overscroll-behavior:contain;min-height:812px;overflow-y:scroll;padding-bottom:40px;}
html{overscroll-behavior:contain;}
body::-webkit-scrollbar{display:none;}
body{-ms-overflow-style:none;scrollbar-width:none;}

.header-bg{position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(180deg,#EAF3FF 0%,#F4F8FF 100%);z-index:0;}
.status-bar{position:relative;z-index:50;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;color:#1F2937;}
.status-bar .time{font-family:Inter,sans-serif;font-weight:700;font-size:15px;}
.nav-bar{position:relative;z-index:50;height:44px;display:flex;align-items:center;justify-content:center;}
.nav-bar .back{position:absolute;left:16px;font-size:22px;color:#1F2937;cursor:pointer;}
.nav-bar .title{font-size:17px;font-weight:700;color:#1F2937;}
.nav-bar .capsule{position:absolute;right:8px;height:32px;width:87px;border-radius:16px;border:0.5px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.capsule-dots{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;}
.capsule-dots span{width:4px;height:4px;border-radius:2px;background:#1F2937;}
.capsule-divider{width:0.5px;height:16px;background:rgba(0,0,0,0.15);}
.capsule-close{flex:1;display:flex;align-items:center;justify-content:center;}

.filter-bar{position:relative;z-index:10;display:flex;align-items:center;padding:8px 16px 0;gap:12px;overflow-x:auto;white-space:nowrap;position:sticky;top:0;background:#F4F8FF;padding-bottom:12px;border-bottom:1px solid #EEF2F8;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-item{font-size:14px;color:#8B96A8;position:relative;padding-bottom:8px;cursor:pointer;user-select:none;flex-shrink:0;}
.filter-item.active{color:#1F2937;font-weight:700;}
.filter-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:16px;height:3px;border-radius:2px;background:#3F86F5;}

.card-list{padding:16px;display:flex;flex-direction:column;gap:16px;}
.vote-card{background:#fff;border-radius:16px;box-shadow:0 2px 6px rgba(33,71,128,0.06);overflow:hidden;cursor:pointer;}
.card-cover{width:100%;height:160px;position:relative;overflow:hidden;}
.card-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.card-scope{position:absolute;top:12px;left:12px;height:22px;padding:0 10px;border-radius:11px;font-size:11px;font-weight:600;display:flex;align-items:center;z-index:2;}
.scope-local{background:rgba(63,134,245,0.85);color:#fff;}
.scope-cross{background:rgba(125,130,246,0.85);color:#fff;}
.scope-all{background:rgba(255,164,36,0.85);color:#fff;}
.card-status{position:absolute;top:12px;right:12px;height:22px;padding:0 10px;border-radius:11px;font-size:11px;font-weight:600;display:flex;align-items:center;}
.status-voting{background:#E9FAF1;color:#34C96E;}
.status-enrolling{background:#EEF5FF;color:#3F86F5;}
.status-publicizing{background:#FFF3E2;color:#FFA424;}
.status-ended{background:#F1F3F8;color:#8B96A8;}
.card-body{padding:14px 16px 16px;}
.card-title{font-size:16px;font-weight:700;color:#1F2937;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-info{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:12px;color:#8B96A8;}
.card-info-item{display:flex;align-items:center;gap:3px;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.card-time{font-size:12px;color:#C6D0DE;}
.card-btn{height:30px;padding:0 16px;border-radius:15px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;}
.btn-blue{background:#3F86F5;color:#fff;box-shadow:0 4px 5px rgba(63,134,245,0.22);}
.btn-gray-text{background:transparent;color:#8B96A8;font-weight:500;}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(34,40,53,0.88);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:100;opacity:0;transition:all 0.3s ease;pointer-events:none;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>

<div class="header-bg"></div>

<div class="status-bar">
  <span class="time">9:41</span>
  <div style="display:flex;gap:5px;align-items:center;">
    <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#1F2937"/><rect x="4" y="4" width="3" height="6" rx="0.5" fill="#1F2937"/><rect x="8" y="2" width="3" height="8" rx="0.5" fill="#1F2937"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="#1F2937"/></svg>
    <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2" fill="none" stroke="#1F2937"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#1F2937"/><rect x="20" y="3" width="1.5" height="4" rx="0.5" fill="#1F2937"/></svg>
  </div>
</div>

<div class="nav-bar">
  <span class="back">&#8249;</span>
  <span class="title">社区投票</span>
  <div class="capsule">
    <div class="capsule-dots"><span></span><span></span><span></span></div>
    <div class="capsule-divider"></div>
    <div class="capsule-close"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-item active" data-cat="all" onclick="filterCat(this)">全部</div>
  <div class="filter-item" data-cat="作品展" onclick="filterCat(this)">作品展</div>
  <div class="filter-item" data-cat="才艺比赛" onclick="filterCat(this)">才艺比赛</div>
  <div class="filter-item" data-cat="话题投票" onclick="filterCat(this)">话题投票</div>
  <div class="filter-item" data-cat="最美评选" onclick="filterCat(this)">最美评选</div>
</div>

<div class="card-list" id="cardList">

  <div class="vote-card" data-cat="作品展">
    <div class="card-cover">
      <img src="https://images.unsplash.com/photo-1546638008-efbe0b62c730?w=375&h=160&fit=crop&q=80" alt="书画展">
      <div class="card-scope scope-local">芳和花园</div>
      <div class="card-status status-voting">投票中</div>
    </div>
    <div class="card-body">
      <div class="card-title">2026年社区书画展</div>
      <div class="card-info">
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#8B96A8" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#8B96A8" stroke-width="1.5" stroke-linecap="round"/></svg>1280人</span>
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.8 3.6L14 6.4l-3 2.9.7 4.1L8 11.4l-3.7 2 .7-4.1-3-2.9 4.2-.8z" stroke="#8B96A8" stroke-width="1.2" stroke-linejoin="round"/></svg>3650票</span>
      </div>
      <div class="card-bottom">
        <span class="card-time">05-01 ~ 05-15</span>
        <button class="card-btn btn-blue" onclick="showToast('跳转到活动详情')">去投票</button>
      </div>
    </div>
  </div>

  <div class="vote-card" data-cat="最美评选">
    <div class="card-cover">
      <img src="https://images.unsplash.com/photo-1486484290742-0ce4eb743a34?w=375&h=160&fit=crop&q=80" alt="阳台花园">
      <div class="card-scope scope-cross">XX街道</div>
      <div class="card-status status-enrolling">报名中</div>
    </div>
    <div class="card-body">
      <div class="card-title">最美阳台花园评选</div>
      <div class="card-info">
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#8B96A8" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#8B96A8" stroke-width="1.5" stroke-linecap="round"/></svg>42人已报名</span>
      </div>
      <div class="card-bottom">
        <span class="card-time">报名截止 05-10</span>
        <button class="card-btn btn-blue" onclick="showToast('跳转到报名页')">我要报名</button>
      </div>
    </div>
  </div>

  <div class="vote-card" data-cat="才艺比赛">
    <div class="card-cover">
      <img src="https://images.unsplash.com/photo-1605627079912-97c3810a11a4?w=375&h=160&fit=crop&q=80" alt="才艺达人秀">
      <div class="card-scope scope-all">全区活动</div>
      <div class="card-status status-publicizing">公示中</div>
    </div>
    <div class="card-body">
      <div class="card-title">社区才艺达人秀</div>
      <div class="card-info">
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#8B96A8" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#8B96A8" stroke-width="1.5" stroke-linecap="round"/></svg>890人</span>
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.8 3.6L14 6.4l-3 2.9.7 4.1L8 11.4l-3.7 2 .7-4.1-3-2.9 4.2-.8z" stroke="#8B96A8" stroke-width="1.2" stroke-linejoin="round"/></svg>2100票</span>
      </div>
      <div class="card-bottom">
        <span class="card-time">公示至 05-20</span>
        <button class="card-btn btn-gray-text" onclick="showToast('跳转到活动详情')">查看结果 ></button>
      </div>
    </div>
  </div>

  <div class="vote-card" data-cat="话题投票">
    <div class="card-cover">
      <img src="https://images.unsplash.com/photo-1529778873920-4da4926a72c2?w=375&h=160&fit=crop&q=80" alt="宠物">
      <div class="card-scope scope-local">翠竹社区</div>
      <div class="card-status status-ended">已结束</div>
    </div>
    <div class="card-body">
      <div class="card-title">社区最受欢迎宠物</div>
      <div class="card-info">
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#8B96A8" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#8B96A8" stroke-width="1.5" stroke-linecap="round"/></svg>560人</span>
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.8 3.6L14 6.4l-3 2.9.7 4.1L8 11.4l-3.7 2 .7-4.1-3-2.9 4.2-.8z" stroke="#8B96A8" stroke-width="1.2" stroke-linejoin="round"/></svg>1800票</span>
      </div>
      <div class="card-bottom">
        <span class="card-time">04-01 ~ 04-15</span>
        <button class="card-btn btn-gray-text" onclick="showToast('跳转到活动详情')">查看结果 ></button>
      </div>
    </div>
  </div>

  <div class="vote-card" data-cat="作品展">
    <div class="card-cover">
      <img src="https://images.unsplash.com/photo-1630476504743-a4d342f88760?w=375&h=160&fit=crop&q=80" alt="儿童绘画">
      <div class="card-scope scope-all">全区活动</div>
      <div class="card-status status-voting">投票中</div>
    </div>
    <div class="card-body">
      <div class="card-title">儿童绘画大赛</div>
      <div class="card-info">
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#8B96A8" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#8B96A8" stroke-width="1.5" stroke-linecap="round"/></svg>650人</span>
        <span class="card-info-item"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.8 3.6L14 6.4l-3 2.9.7 4.1L8 11.4l-3.7 2 .7-4.1-3-2.9 4.2-.8z" stroke="#8B96A8" stroke-width="1.2" stroke-linejoin="round"/></svg>1890票</span>
      </div>
      <div class="card-bottom">
        <span class="card-time">05-05 ~ 05-20</span>
        <button class="card-btn btn-blue" onclick="showToast('跳转到活动详情')">去投票</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function filterCat(el){
  document.querySelectorAll('.filter-item').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  var cat=el.getAttribute('data-cat');
  document.querySelectorAll('.vote-card').forEach(function(c){
    if(cat==='all'||c.getAttribute('data-cat')===cat){c.style.display='block';}
    else{c.style.display='none';}
  });
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1800);
}
</script>
</body>
</html>
