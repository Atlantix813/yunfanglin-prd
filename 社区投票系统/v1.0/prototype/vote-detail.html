<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>活动详情</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;background:#F2F5FA;color:#1F2937;font-size:14px;width:375px;overscroll-behavior:contain;min-height:812px;overflow-y:scroll;padding-bottom:20px;}
html{overscroll-behavior:contain;}
body::-webkit-scrollbar{display:none;}
body{-ms-overflow-style:none;scrollbar-width:none;}

/* === Cover Swiper === */
.cover{width:100%;height:200px;position:relative;overflow:hidden;}
.cover-track{display:flex;width:300%;height:100%;transition:transform 0.3s ease;}
.cover-slide{width:375px;height:200px;flex-shrink:0;}
.cover-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;}
.cover-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,0.5);}
.cover-dot.active{background:#fff;width:14px;}
.cover-badge{height:22px;padding:0 9px;border-radius:11px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.badge-scope{background:rgba(63,134,245,0.12);color:#3F86F5;}
.badge-status{background:rgba(52,201,110,0.12);color:#34C96E;}
.status-bar{position:absolute;top:0;left:0;right:0;z-index:50;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;color:#fff;}
.status-bar .time{font-family:Inter,sans-serif;font-weight:700;font-size:15px;}
.nav-bar{position:absolute;top:44px;left:0;right:0;z-index:50;height:44px;display:flex;align-items:center;justify-content:center;}
.nav-bar .back{position:absolute;left:16px;font-size:22px;color:#fff;cursor:pointer;}
.nav-bar .title{font-size:17px;font-weight:700;color:#fff;}
.nav-bar .capsule{position:absolute;right:8px;height:32px;width:87px;border-radius:16px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.capsule-dots{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;}
.capsule-dots span{width:4px;height:4px;border-radius:2px;background:#fff;}
.capsule-divider{width:0.5px;height:16px;background:rgba(255,255,255,0.3);}
.capsule-close{flex:1;display:flex;align-items:center;justify-content:center;}

/* === Stat Panel (inside white area) === */
.stat-panel{margin:0;background:linear-gradient(135deg,#3F86F5 0%,#5B9FFF 100%);border-radius:10px;padding:14px 0;display:flex;box-shadow:0 4px 12px rgba(63,134,245,0.25);}
.stat-item{flex:1;text-align:center;}
.stat-num{font-family:Inter,sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.75);margin-top:4px;}
.stat-item+.stat-item{border-left:1px solid rgba(255,255,255,0.2);}

/* === Info Section (flush with cover, no gap) === */
.info-section{margin:0;background:#fff;padding:12px 12px 12px;border-radius:0 0 12px 12px;}
.countdown-dot{width:6px;height:6px;border-radius:3px;background:#FF8C00;flex-shrink:0;animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.rule-box{margin-top:0;padding:10px 12px;background:#F0F3F8;border-radius:8px;font-size:12px;color:#6B7B90;line-height:1.5;}
.rule-box strong{color:#4B5563;}

/* === Section Header (title + sort in one row) === */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px;position:sticky;top:0;background:#F2F5FA;z-index:20;}
.section-left{display:flex;align-items:baseline;gap:6px;}
.section-title-text{font-size:16px;font-weight:700;color:#1F2937;}
.section-count{font-size:12px;color:#8B96A8;font-weight:400;}
.sort-tabs{display:flex;align-items:center;gap:0;background:#F0F3F8;border-radius:6px;padding:2px;}
.sort-item{font-size:12px;color:#8B96A8;padding:4px 10px;border-radius:4px;cursor:pointer;user-select:none;font-weight:500;transition:all 0.15s;}
.sort-item.active{background:#fff;color:#1F2937;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.06);}
.sort-divider{display:none;}

/* === Works Grid (Pinterest/XHS style) === */
.works-grid{padding:4px 12px 12px;display:flex;gap:6px;}
.works-col{flex:1;display:flex;flex-direction:column;gap:6px;}
.work-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(33,71,128,0.04);}
.work-img{width:100%;position:relative;}
.work-img img{width:100%;display:block;}
.work-no{position:absolute;top:0;left:0;background:rgba(31,41,55,0.6);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:0 0 6px 0;}
.work-body{padding:6px 8px 8px;}
.work-name{font-size:13px;font-weight:600;color:#1F2937;line-height:1.35;}
.work-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.work-votes{font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#FF8C00;}
.work-votes span{font-size:10px;font-weight:400;color:#8B96A8;}
.vote-btn{height:22px;padding:0 10px;border-radius:4px;border:none;font-size:10px;font-weight:700;cursor:pointer;}
.vote-btn.active{background:linear-gradient(135deg,#3F86F5,#5B9FFF);color:#fff;}
.vote-btn.disabled{background:#F1F3F8;color:#C6D0DE;cursor:default;}

/* === Toast & Hints === */
.share-hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(34,40,53,0.88);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:80;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.share-hint.show{opacity:1;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(34,40,53,0.88);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:100;opacity:0;transition:all 0.3s ease;pointer-events:none;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>

<!-- Cover Swiper -->
<div class="cover" id="coverSwiper">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div style="display:flex;gap:5px;align-items:center;">
      <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#fff"/><rect x="4" y="4" width="3" height="6" rx="0.5" fill="#fff"/><rect x="8" y="2" width="3" height="8" rx="0.5" fill="#fff"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="#fff"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2" fill="none" stroke="#fff"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#fff"/><rect x="20" y="3" width="1.5" height="4" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <span class="back">&#8249;</span>
    <span class="title">活动详情</span>
    <div class="capsule">
      <div class="capsule-dots"><span></span><span></span><span></span></div>
      <div class="capsule-divider"></div>
      <div class="capsule-close"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
    </div>
  </div>
  <div class="cover-track" id="coverTrack">
    <div class="cover-slide"><img src="https://images.unsplash.com/photo-1546638008-efbe0b62c730?w=375&h=200&fit=crop&q=80"></div>
    <div class="cover-slide"><img src="https://images.unsplash.com/photo-1684871430772-569936b1a0ae?w=375&h=200&fit=crop&q=80"></div>
    <div class="cover-slide"><img src="https://images.unsplash.com/photo-1486303954368-398fea0e72cd?w=375&h=200&fit=crop&q=80"></div>
  </div>
  <div class="cover-dots">
    <div class="cover-dot active"></div>
    <div class="cover-dot"></div>
    <div class="cover-dot"></div>
  </div>
</div>

<!-- White panel flush with cover -->
<div class="info-section">
  <!-- Stat Panel -->
  <div class="stat-panel">
    <div class="stat-item"><div class="stat-num">1,280</div><div class="stat-label">参与人数</div></div>
    <div class="stat-item"><div class="stat-num">3,650</div><div class="stat-label">累计票数</div></div>
    <div class="stat-item"><div class="stat-num">8,920</div><div class="stat-label">浏览量</div></div>
  </div>
  <!-- Title + status badge -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:10px 0 0;">
    <div style="font-size:18px;font-weight:700;color:#1F2937;line-height:1.4;flex:1;">2026年社区书画展</div>
    <span class="cover-badge badge-status" style="flex-shrink:0;margin-top:2px;"><svg width="6" height="6" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" fill="#34C96E"/></svg>投票中</span>
  </div>
  <!-- Desc -->
  <div style="font-size:13px;color:#4B5563;line-height:1.6;padding:6px 0 10px;">为展示社区居民的艺术才华，丰富社区文化生活，特举办2026年社区书画展。欢迎社区居民踊跃参与，展示您的书法、绘画、手工艺作品。优秀作品将获得积分奖励，并在社区文化中心展出。本次活动由社区居委会主办，旨在促进邻里交流。</div>
  <!-- Rule box -->
  <div class="rule-box">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <strong>投票规则</strong>
      <span style="font-size:11px;color:#E67E00;font-weight:600;display:flex;align-items:center;gap:4px;"><span class="countdown-dot"></span>距结束 5天12时36分</span>
    </div>
    <div style="margin-top:4px;">每人每天可投 5 票，每个作品每天限投 1 票</div>
  </div>
  <!-- Scope tip inside white panel -->
  <div style="display:flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:#3F86F5;font-weight:500;">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#3F86F5" stroke-width="1.5"/><path d="M8 5v4M8 11h.01" stroke="#3F86F5" stroke-width="1.5" stroke-linecap="round"/></svg>
    仅限 芳和花园 居民参与
  </div>
</div>

<!-- Section header: title left + sort right (single row) -->
<div class="section-header">
  <div class="section-left">
    <span class="section-title-text">候选作品</span>
    <span class="section-count">共 8 个</span>
  </div>
  <div class="sort-tabs">
    <span class="sort-item active" onclick="switchSort('no',this)">按编号</span>
    <span class="sort-divider"></span>
    <span class="sort-item" onclick="switchSort('votes',this)">按票数</span>
  </div>
</div>

<!-- Works Grid -->
<div class="works-grid" id="worksGrid"></div>

<div class="share-hint" id="shareHint">分享给朋友一起投票吧</div>
<div class="toast" id="toast"></div>

<script>
var works=[
  {no:1,name:'山水画 - 春意盎然',votes:456,h:225,img:'https://images.unsplash.com/photo-1684871430772-569936b1a0ae?w=170&h=225&fit=crop&q=80',voted:true},
  {no:2,name:'书法 - 家和万事兴',votes:328,h:128,img:'https://images.unsplash.com/photo-1486303954368-398fea0e72cd?w=170&h=128&fit=crop&q=80',voted:true},
  {no:3,name:'油画 - 社区花园',votes:289,h:128,img:'https://images.unsplash.com/photo-1632770464350-e73ae4aaa11c?w=170&h=128&fit=crop&q=80',voted:false},
  {no:4,name:'水彩 - 夕阳小径',votes:245,h:225,img:'https://images.unsplash.com/photo-1713118774750-e1878e76b067?w=170&h=225&fit=crop&q=80',voted:false},
  {no:5,name:'国画 - 荷塘月色',votes:412,h:225,img:'https://images.unsplash.com/photo-1699003788740-5f2df501bdcf?w=170&h=225&fit=crop&q=80',voted:false},
  {no:6,name:'素描 - 社区老树',votes:198,h:128,img:'https://images.unsplash.com/photo-1545038522-9bb451739ab9?w=170&h=128&fit=crop&q=80',voted:false},
  {no:7,name:'剪纸 - 福满邻里',votes:176,h:128,img:'https://images.unsplash.com/photo-1583389409210-0234eee7cdce?w=170&h=128&fit=crop&q=80',voted:false},
  {no:8,name:'版画 - 社区晨曦',votes:164,h:225,img:'https://images.unsplash.com/photo-1689259103820-a375e5a30e00?w=170&h=225&fit=crop&q=80',voted:false}
];

function renderWorks(sortBy){
  var arr=works.slice();
  if(sortBy==='votes') arr.sort(function(a,b){return b.votes-a.votes;});
  var col1='',col2='';
  arr.forEach(function(w,i){
    var btnClass=w.voted?'vote-btn disabled':'vote-btn active';
    var btnText=w.voted?'已投票':'投票';
    var card='<div class="work-card" id="card-'+w.no+'">'+
      '<div class="work-img"><img src="'+w.img+'" style="height:'+w.h+'px;width:100%;object-fit:cover;display:block;"><div class="work-no">'+String(w.no).padStart(2,'0')+'号</div></div>'+
      '<div class="work-body"><div class="work-name">'+w.name+'</div>'+
      '<div class="work-meta"><div class="work-votes" id="votes-'+w.no+'">'+w.votes+' <span>票</span></div>'+
      '<button class="'+btnClass+'" id="btn-'+w.no+'" onclick="doVote('+w.no+')">'+btnText+'</button></div>'+
      '</div></div>';
    if(i%2===0) col1+=card; else col2+=card;
  });
  document.getElementById('worksGrid').innerHTML='<div class="works-col">'+col1+'</div><div class="works-col">'+col2+'</div>';
}

function doVote(no){
  var w=works.find(function(x){return x.no===no;});
  if(w.voted) return;
  w.voted=true;w.votes++;
  document.getElementById('btn-'+no).className='vote-btn disabled';
  document.getElementById('btn-'+no).textContent='已投票';
  document.getElementById('votes-'+no).innerHTML=w.votes+' <span>票</span>';
  showToast('投票成功!');
  setTimeout(function(){document.getElementById('shareHint').classList.add('show');setTimeout(function(){document.getElementById('shareHint').classList.remove('show');},3000);},500);
}

function switchSort(type,el){
  document.querySelectorAll('.sort-item').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderWorks(type);
}

var coverIdx=0,coverTrack=document.getElementById('coverTrack'),coverDots=document.querySelectorAll('.cover-dot');
function slideCover(dir){coverIdx=Math.max(0,Math.min(2,coverIdx+dir));coverTrack.style.transform='translateX(-'+coverIdx*375+'px)';coverDots.forEach(function(d,i){d.classList.toggle('active',i===coverIdx);});}
var csx=0;document.getElementById('coverSwiper').addEventListener('touchstart',function(e){csx=e.touches[0].clientX;});
document.getElementById('coverSwiper').addEventListener('touchend',function(e){var d=e.changedTouches[0].clientX-csx;if(Math.abs(d)>40){slideCover(d<0?1:-1);}});
setInterval(function(){coverIdx=(coverIdx+1)%3;coverTrack.style.transform='translateX(-'+coverIdx*375+'px)';coverDots.forEach(function(d,i){d.classList.toggle('active',i===coverIdx);});},4000);

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

renderWorks('no');
</script>
</body>
</html>
