<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>作品详情</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;background:#F4F8FF;color:#1F2937;font-size:14px;width:375px;overscroll-behavior:contain;min-height:812px;overflow-y:scroll;padding-bottom:80px;}
html{overscroll-behavior:contain;}
body::-webkit-scrollbar{display:none;}
body{-ms-overflow-style:none;scrollbar-width:none;}

.status-bar{position:absolute;top:0;left:0;right:0;z-index:50;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;color:#fff;}
.status-bar .time{font-family:Inter,sans-serif;font-weight:700;font-size:15px;}
.nav-bar{position:absolute;top:44px;left:0;right:0;z-index:50;height:44px;display:flex;align-items:center;justify-content:center;}
.nav-bar .back{position:absolute;left:16px;font-size:22px;color:#fff;cursor:pointer;}
.nav-bar .title{font-size:17px;font-weight:700;color:#fff;}
.nav-bar .capsule{position:absolute;right:8px;height:32px;width:87px;border-radius:16px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;}
.capsule-dots{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;}
.capsule-dots span{width:4px;height:4px;border-radius:2px;background:#fff;}
.capsule-divider{width:0.5px;height:16px;background:rgba(255,255,255,0.3);}
.capsule-close{flex:1;display:flex;align-items:center;justify-content:center;}

.swiper{width:100%;height:300px;position:relative;overflow:hidden;background:#E8EEF8;}
.swiper-track{display:flex;width:300%;height:100%;transition:transform 0.3s ease;}
.swiper-slide{width:375px;height:300px;flex-shrink:0;}
.swiper-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
.swiper-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,0.5);}
.swiper-dot.active{background:#fff;width:16px;}

.info-card{margin:16px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 6px rgba(33,71,128,0.06);}
.info-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.info-no{background:#3F86F5;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;}
.info-name{font-size:18px;font-weight:700;color:#1F2937;}
.info-stats{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
.info-votes{font-family:Inter,sans-serif;font-size:28px;font-weight:700;color:#FFA424;}
.info-votes span{font-size:14px;font-weight:400;color:#8B96A8;margin-left:2px;}
.info-rank{font-size:14px;color:#8B96A8;}
.info-desc{font-size:14px;color:#4B5563;line-height:1.7;padding-top:14px;border-top:1px solid #EEF2F8;}
.info-author{margin-top:12px;font-size:13px;color:#8B96A8;}

.record-card{margin:0 16px 16px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 6px rgba(33,71,128,0.06);}
.record-title{font-size:15px;font-weight:700;color:#1F2937;margin-bottom:12px;}
.record-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F4F6F9;}
.record-item:last-child{border-bottom:none;}
.record-avatar{width:32px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0;}
.record-info{flex:1;}
.record-name{font-size:14px;color:#1F2937;font-weight:500;}
.record-time{font-size:12px;color:#C6D0DE;}

.bottom-bar{position:fixed;bottom:0;left:0;width:375px;height:64px;background:#fff;border-top:1px solid #EEF2F8;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:30;}
.bottom-info{display:flex;flex-direction:column;}
.bottom-votes{font-family:Inter,sans-serif;font-size:18px;font-weight:700;color:#FFA424;}
.bottom-votes span{font-size:12px;color:#8B96A8;font-weight:400;}
.bottom-rank{font-size:12px;color:#8B96A8;}
.bottom-btn{width:120px;height:44px;border-radius:22px;border:none;background:#3F86F5;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(63,134,245,0.3);}
.bottom-btn.disabled{background:#F1F3F8;color:#C6D0DE;box-shadow:none;}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(34,40,53,0.88);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:100;opacity:0;transition:all 0.3s ease;pointer-events:none;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>

<div class="swiper" id="swiper">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div style="display:flex;gap:5px;align-items:center;">
      <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#fff"/><rect x="4" y="4" width="3" height="6" rx="0.5" fill="#fff"/><rect x="8" y="2" width="3" height="8" rx="0.5" fill="#fff"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="#fff"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2" fill="none" stroke="#fff"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#fff"/><rect x="20" y="3" width="1.5" height="4" rx="0.5" fill="#fff"/></svg>
    </div>
  </div>
  <div class="nav-bar">
    <span class="back">&#8249;</span>
    <span class="title">作品详情</span>
    <div class="capsule">
      <div class="capsule-dots"><span></span><span></span><span></span></div>
      <div class="capsule-divider"></div>
      <div class="capsule-close"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
    </div>
  </div>
  <div class="swiper-track" id="swiperTrack">
    <div class="swiper-slide" style="background:linear-gradient(135deg,#C5F5DA 0%,#7DE8A8 40%,#34C96E 100%);"></div>
    <div class="swiper-slide" style="background:linear-gradient(135deg,#B8D8FF 0%,#5395FF 40%,#2F6BD6 100%);"></div>
    <div class="swiper-slide" style="background:linear-gradient(135deg,#FFE5B2 0%,#FFCA70 40%,#FFA424 100%);"></div>
  </div>
  <div class="swiper-dots">
    <div class="swiper-dot active" data-idx="0"></div>
    <div class="swiper-dot" data-idx="1"></div>
    <div class="swiper-dot" data-idx="2"></div>
  </div>
</div>

<div class="info-card">
  <div class="info-top">
    <span class="info-no">03号</span>
    <span class="info-name">油画 - 社区花园</span>
  </div>
  <div class="info-stats">
    <div class="info-votes" id="voteCount">328<span>票</span></div>
    <div class="info-rank">第3名</div>
  </div>
  <div class="info-desc">这幅油画描绘了社区花园四季变换的美景。画面中央是居民们精心维护的花坛，远处可见社区活动中心的身影。作品以温暖的色调展现了社区生活的和谐氛围，表达了对美好邻里关系的热爱。</div>
  <div class="info-author">参赛者：张阿姨</div>
</div>

<div class="record-card">
  <div class="record-title">最近投票</div>
  <div class="record-item"><div class="record-avatar" style="background:#3F86F5;">李</div><div class="record-info"><div class="record-name">李大爷</div></div><div class="record-time">3分钟前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#34C96E;">王</div><div class="record-info"><div class="record-name">王阿姨</div></div><div class="record-time">8分钟前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#FFA424;">赵</div><div class="record-info"><div class="record-name">赵奶奶</div></div><div class="record-time">15分钟前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#7D82F6;">陈</div><div class="record-info"><div class="record-name">陈先生</div></div><div class="record-time">28分钟前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#FF7E66;">刘</div><div class="record-info"><div class="record-name">刘姐</div></div><div class="record-time">1小时前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#47B5F2;">周</div><div class="record-info"><div class="record-name">周叔叔</div></div><div class="record-time">1小时前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#3F86F5;">吴</div><div class="record-info"><div class="record-name">吴大哥</div></div><div class="record-time">2小时前</div></div>
  <div class="record-item"><div class="record-avatar" style="background:#34C96E;">孙</div><div class="record-info"><div class="record-name">孙小妹</div></div><div class="record-time">3小时前</div></div>
</div>

<div class="bottom-bar">
  <div class="bottom-info">
    <div class="bottom-votes" id="bottomVotes">328 <span>票</span></div>
    <div class="bottom-rank">当前排名 第3名</div>
  </div>
  <button class="bottom-btn" id="voteBtn" onclick="doVote()">投票</button>
</div>

<div class="toast" id="toast"></div>

<script>
var currentSlide=0;
var track=document.getElementById('swiperTrack');
var dots=document.querySelectorAll('.swiper-dot');
var startX=0;
document.getElementById('swiper').addEventListener('touchstart',function(e){startX=e.touches[0].clientX;});
document.getElementById('swiper').addEventListener('touchend',function(e){
  var diff=e.changedTouches[0].clientX-startX;
  if(Math.abs(diff)>50){
    if(diff<0&&currentSlide<2) currentSlide++;
    else if(diff>0&&currentSlide>0) currentSlide--;
    track.style.transform='translateX(-'+currentSlide*375+'px)';
    dots.forEach(function(d,i){d.classList.toggle('active',i===currentSlide);});
  }
});

var voted=false;
var count=328;
function doVote(){
  if(voted) return;
  voted=true;count++;
  document.getElementById('voteBtn').className='bottom-btn disabled';
  document.getElementById('voteBtn').textContent='已投票';
  document.getElementById('voteCount').innerHTML=count+'<span>票</span>';
  document.getElementById('bottomVotes').innerHTML=count+' <span>票</span>';
  showToast('投票成功!');
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1800);
}
</script>
</body>
</html>
