<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>教培系统课时学习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #fff;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body { overflow-x: hidden; }
    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      background: #fff;
      overflow: hidden;
    }
    .video-body {
      width: 100%;
      background: #000;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .back-icon {
      width: 30px;
      height: 30px;
      position: absolute;
      top: 12px;
      left: 20px;
      z-index: 20;
      border: 0;
      background: transparent;
    }
    .back-icon::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 7px;
      width: 12px;
      height: 12px;
      border-left: 2px solid rgba(255,255,255,.95);
      border-bottom: 2px solid rgba(255,255,255,.95);
      transform: rotate(45deg);
    }
    .video-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 211px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(60,167,250,.2), transparent 82px),
        linear-gradient(180deg, #050505 0%, #111 100%);
    }
    .center-play {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px 0 0 -28px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.26);
    }
    .center-play::after {
      content: "";
      position: absolute;
      left: 22px;
      top: 17px;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 16px solid rgba(255,255,255,.92);
    }
    .controller {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 42px;
      color: #fff;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.58));
    }
    .bar-wrap {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 0;
      height: 7px;
      display: flex;
      align-items: center;
    }
    .bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,.22);
      position: relative;
    }
    .bar::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 38%;
      height: 3px;
      background: #3ca7fa;
    }
    .controller-icons {
      height: 42px;
      padding: 9px 20px 0 18px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      color: #fff;
      font-size: 13px;
    }
    .play-button {
      width: 17px;
      height: 20px;
      margin-top: 1px;
      background: #dfe3ea;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      flex: 0 0 17px;
    }
    .time { min-width: 96px; line-height: 22px; }
    .quality { margin-left: auto; line-height: 22px; }
    .chapters-hours-cont {
      width: 100%;
      background: #fff;
      padding: 10px 20px 20px;
    }
    .hours-list-box { width: 100%; display: flex; flex-direction: column; }
    .chapter-it { width: 100%; margin-top: 20px; }
    .chapter-name {
      width: 100%;
      font-size: 15px;
      font-weight: 500;
      color: rgba(0,0,0,.88);
      line-height: 15px;
      text-align: left;
      margin-bottom: 5px;
    }
    .hours-it { width: 100%; margin-top: 10px; }
    .item {
      width: 100%;
      background: #fafafa;
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      padding: 10px;
      text-align: left;
    }
    .top-item {
      width: 100%;
      height: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .left-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 16px;
    }
    .video-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: rgba(0,0,0,.3);
      position: relative;
    }
    .video-dot::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 3px;
      width: 0;
      height: 0;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      border-left: 5px solid #fff;
    }
    .studying { color: #ff4d4f; font-size: 12px; line-height: 16px; }
    .complete { color: rgba(0,0,0,.45); font-size: 12px; line-height: 16px; }
    .title {
      width: 100%;
      font-size: 14px;
      color: rgba(0,0,0,.88);
      line-height: 20px;
      margin-top: 15px;
    }
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(31,41,55,.92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: .18s;
      z-index: 50;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <main class="page">
    <div class="video-body">
      <button class="back-icon" onclick="toast('返回课程详情')"></button>
      <div class="video-box">
        <div class="center-play"></div>
        <div class="controller">
          <div class="bar-wrap"><div class="bar"></div></div>
          <div class="controller-icons">
            <div class="play-button"></div>
            <div class="time">06:18 / 18:00</div>
            <div class="quality">高清</div>
          </div>
        </div>
      </div>
    </div>

    <section class="chapters-hours-cont">
      <div class="hours-list-box">
        <div class="chapter-it">
          <div class="chapter-name">第一章 调解前准备</div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="studying">学习中</div>
              </div>
              <div class="title">识别矛盾类型与当事人诉求 (00:18)</div>
            </div>
          </div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="complete">已学完</div>
              </div>
              <div class="title">调解现场的开场话术 (00:18)</div>
            </div>
          </div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="complete">已学完</div>
              </div>
              <div class="title">事实记录与证据保留 (00:18)</div>
            </div>
          </div>
        </div>

        <div class="chapter-it">
          <div class="chapter-name">第二章 沟通与收尾</div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="studying">学习到00:03:40</div>
              </div>
              <div class="title">情绪安抚与共情表达 (00:20)</div>
            </div>
          </div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="complete">已学完</div>
              </div>
              <div class="title">方案协商与责任确认 (00:20)</div>
            </div>
          </div>
          <div class="hours-it">
            <div class="item">
              <div class="top-item">
                <div class="left-tag"><span class="video-dot"></span><span>视频</span></div>
                <div class="complete">已学完</div>
              </div>
              <div class="title">回访安排与结果归档 (00:20)</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script>
    function toast(text) {
      var node = document.getElementById('toast');
      node.textContent = text;
      node.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () {
        node.classList.remove('show');
      }, 1200);
    }
  </script>
</body>
</html>
