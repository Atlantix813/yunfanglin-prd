<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>教培系统在学页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #fff;
      color: #171923;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      background: #fff;
      overflow: hidden;
    }
    .content {
      min-height: 100vh;
      padding: 0 20px 75px;
      overflow-y: auto;
      background: #fff;
      text-align: left;
    }
    .title {
      width: 100%;
      padding: 20px 0;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0,0,0,.88);
      line-height: 24px;
    }
    .label {
      width: 100%;
      height: 40px;
      font-size: 14px;
      color: rgba(0,0,0,.45);
      line-height: 40px;
    }
    .item {
      width: 100%;
      height: 75px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .thumb {
      width: 100px;
      height: 75px;
      border-radius: 8px;
      margin-right: 15px;
      position: relative;
      overflow: hidden;
      flex: 0 0 100px;
      background: linear-gradient(180deg, var(--c1), var(--c2));
    }
    .thumb::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 12px;
      width: 30px;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 0 rgba(255,255,255,.85), 10px 16px 0 rgba(255,255,255,.72);
    }
    .thumb::after {
      content: "";
      position: absolute;
      right: -14px;
      top: -8px;
      width: 58px;
      height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,.62);
    }
    .info {
      flex: 1;
      height: 75px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .item-title {
      width: 100%;
      height: 42px;
      font-size: 15px;
      font-weight: 400;
      color: rgba(0,0,0,.88);
      line-height: 21px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .item-record {
      width: 100%;
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .type, .active-type {
      width: 46px;
      height: 24px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      flex: 0 0 46px;
    }
    .type { background: rgba(255,77,79,.1); color: #ff4d4f; }
    .active-type { background: rgba(255,153,0,.1); color: #ff9900; }
    .tip {
      flex: 1;
      height: 12px;
      font-size: 12px;
      color: #ff4d4f;
      line-height: 12px;
      margin-left: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sp-line {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,.05);
      margin-bottom: 20px;
    }
    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 430px;
      min-height: 55px;
      background: #fff;
      box-shadow: 0 -1px 4px rgba(0,0,0,.04);
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 30;
    }
    .foot-item {
      border: 0;
      background: transparent;
      padding: 6px 0 5px;
      color: #ccc;
      font-size: 11px;
      line-height: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .foot-item.active { color: #ff4d4f; }
    .foot-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .foot-icon svg { width: 24px; height: 24px; }
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(31,41,55,.92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: .18s;
      z-index: 50;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <main class="page">
    <section class="content">
      <div class="title">最近学习</div>

      <div class="label">今日</div>
      <div class="item">
        <div class="thumb" style="--c1:#35b3ff;--c2:#13b4a9;"></div>
        <div class="info">
          <div class="item-title">社区合伙人政策与准入规则</div>
          <div class="item-record">
            <div class="type">必修课</div>
            <div class="tip">学习进度 86%</div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="label">昨日</div>
      <div class="item">
        <div class="thumb" style="--c1:#7348ff;--c2:#c236c9;"></div>
        <div class="info">
          <div class="item-title">社区服务站日常巡查与记录规范</div>
          <div class="item-record">
            <div class="type">必修课</div>
            <div class="tip">学习进度 100%</div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="label">更早</div>
      <div class="item">
        <div class="thumb" style="--c1:#16b7c2;--c2:#2489c9;"></div>
        <div class="info">
          <div class="item-title">社区工作者情绪管理与职业倦怠预防</div>
          <div class="item-record">
            <div class="active-type">选修课</div>
            <div class="tip">学习进度 42%</div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>
      <div class="item">
        <div class="thumb" style="--c1:#ffa617;--c2:#ff6332;"></div>
        <div class="info">
          <div class="item-title">民法典与社区治理</div>
          <div class="item-record">
            <div class="active-type">选修课</div>
            <div class="tip">学习进度 18%</div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">
      <button class="foot-item" onclick="toast('跳转：首页')">
        <span class="foot-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="1.9"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>
        </span>
        <span>首页</span>
      </button>
      <button class="foot-item active" onclick="toast('当前页：学习')">
        <span class="foot-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FF4D4F" stroke-width="1.9"><path d="M4 5h7v14H4z"/><path d="M13 5h7v14h-7z"/><path d="M11 7h2M11 17h2"/></svg>
        </span>
        <span>学习</span>
      </button>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script>
    function toast(text) {
      var node = document.getElementById('toast');
      node.textContent = text;
      node.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () {
        node.classList.remove('show');
      }, 1200);
    }
  </script>
</body>
</html>
