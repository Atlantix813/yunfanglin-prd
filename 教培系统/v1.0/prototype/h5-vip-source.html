<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeEdu H5 VIP会员</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f6f6f6;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      padding-top: 50px;
      padding-bottom: 49px;
      background: #f6f6f6;
      overflow: hidden;
    }
    .navheader {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #f1f2f6;
      background: #fff;
    }
    .back {
      position: absolute;
      left: 15px;
      width: 19px;
      height: 19px;
      cursor: pointer;
    }
    .title {
      width: 72%;
      color: #333;
      font-size: 17px;
      font-weight: 600;
      line-height: 22px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-info {
      display: flex;
      width: 100%;
      margin: 15px 0;
      padding: 20px 15px;
      background: #fff;
    }
    .avatar img {
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }
    .role-info {
      margin-left: 15px;
      padding-top: 4px;
      color: #333;
      font-size: 13px;
      line-height: 20px;
    }
    .blank { min-height: calc(100vh - 164px); }
    .bottom-bar {
      position: fixed;
      left: 0;
      bottom: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      height: 49px;
      border: 0;
      background: #cea200;
      color: #fff;
      font-size: 14px;
      line-height: 49px;
      text-align: center;
      cursor: pointer;
    }
    .bottom-bar:active, .back:active { opacity: .72; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 68px;
      z-index: 50;
      min-width: 140px;
      max-width: 280px;
      padding: 10px 14px;
      transform: translateX(-50%) translateY(8px);
      border-radius: 8px;
      background: rgba(31, 41, 55, .92);
      color: #fff;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: .18s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <main class="page">
    <header class="navheader">
      <img class="back" src="meedu-assets/icon-back.png" alt="返回" data-toast="返回上一页">
      <div class="title">VIP会员</div>
    </header>
    <section class="user-info">
      <div class="avatar"><img src="meedu-assets/live-member-avatar.png" alt="头像"></div>
      <div class="role-info">
        <div>您还不是本站会员哦</div>
        <div>免费会员</div>
      </div>
    </section>
    <section class="blank" aria-label="空白内容"></section>
    <button class="bottom-bar" type="button" data-toast="购买会员">购买会员</button>
    <div id="toast" class="toast"></div>
  </main>
  <script>
    const toast = document.getElementById('toast');
    let timer = null;
    document.querySelectorAll('[data-toast]').forEach((node) => {
      node.addEventListener('click', () => {
        toast.textContent = node.getAttribute('data-toast');
        toast.classList.add('show');
        clearTimeout(timer);
        timer = setTimeout(() => toast.classList.remove('show'), 1200);
      });
    });
  </script>
</body>
</html>
