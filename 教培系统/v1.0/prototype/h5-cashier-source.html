<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeEdu H5 收银台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f6f6f6;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      padding-top: 50px;
      padding-bottom: 49px;
      background: #f6f6f6;
      overflow: hidden;
    }
    .navheader {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #f1f2f6;
      background: #fff;
    }
    .back {
      position: absolute;
      left: 15px;
      width: 19px;
      height: 19px;
      cursor: pointer;
    }
    .title {
      width: 72%;
      color: #333;
      font-size: 17px;
      font-weight: 600;
      line-height: 22px;
      text-align: center;
    }
    .goods-box {
      width: 100%;
      height: 174px;
      margin-top: 10px;
      padding: 15px;
      background: #fff;
      text-align: left;
    }
    .goods-box .tit {
      height: 14px;
      margin-bottom: 30px;
      color: #333;
      font-size: 14px;
      line-height: 14px;
      font-weight: 400;
    }
    .goods-item { display: flex; height: 75px; }
    .goods-thumb {
      flex: 0 0 100px;
      width: 100px;
      height: 75px;
      margin-right: 15px;
      overflow: hidden;
      border-radius: 2px;
      background: #f7f7f7;
    }
    .goods-thumb img {
      display: block;
      width: 100px;
      height: 75px;
      object-fit: cover;
    }
    .goods-info {
      min-width: 0;
      flex: 1;
      height: 75px;
      padding-top: 1px;
    }
    .goods-name {
      width: 100%;
      height: 18px;
      margin-bottom: 9px;
      color: #333;
      font-size: 16px;
      font-weight: 700;
      line-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .goods-label {
      height: 13px;
      margin-bottom: 17px;
      color: #ff4d4f;
      font-size: 13px;
      line-height: 13px;
    }
    .goods-charge {
      height: 15px;
      color: #fd3968;
      font-size: 15px;
      font-weight: 600;
      line-height: 15px;
    }
    .promocode-box {
      width: 100%;
      height: 57px;
      margin-top: 10px;
      padding: 0 15px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .promocode-box .info {
      color: #333;
      font-size: 15px;
      line-height: 15px;
    }
    .promocode-box img { width: 19px; height: 19px; }
    .spacer { min-height: calc(100vh - 340px); }
    .box-footer {
      position: fixed;
      left: 0;
      bottom: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      height: 49px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price-box {
      height: 24px;
      margin-left: 15px;
      color: #ff4d4f;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
    }
    .price-box .big { font-size: 24px; font-weight: 600; }
    .btn-submit {
      width: 144px;
      height: 49px;
      border: 0;
      background: #000;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .mask {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .45);
    }
    .mask.show { display: flex; }
    .popup {
      width: 325px;
      height: 204px;
      border-radius: 4px;
      background: #fff;
      padding-top: 35px;
    }
    .input-item {
      display: block;
      width: 255px;
      height: 45px;
      margin: 0 auto;
      border: 0;
      border-bottom: 1px solid #d8d8d8;
      outline: none;
      color: #333;
      font-size: 14px;
    }
    .confirm {
      width: 255px;
      height: 44px;
      margin: 50px auto 0;
      border: 0;
      border-radius: 4px;
      background: #1784ed;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 68px;
      z-index: 80;
      min-width: 150px;
      padding: 10px 14px;
      transform: translateX(-50%) translateY(8px);
      border-radius: 8px;
      background: rgba(31, 41, 55, .92);
      color: #fff;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: .18s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .back:active, .promocode-box:active, .btn-submit:active, .confirm:active { opacity: .72; }
  </style>
</head>
<body>
  <main class="page">
    <header class="navheader">
      <img class="back" src="meedu-assets/icon-back.png" alt="返回" data-toast="返回上一页">
      <div class="title">收银台</div>
    </header>
    <section class="goods-box">
      <div class="tit">商品信息</div>
      <div class="goods-item">
        <div class="goods-thumb"><img src="meedu-assets/default-vip.png" alt="课程封面"></div>
        <div class="goods-info">
          <div class="goods-name">社区矛盾调解沟通技巧</div>
          <div class="goods-label">录播课程</div>
          <div class="goods-charge">￥99</div>
        </div>
      </div>
    </section>
    <section class="promocode-box" id="promoBtn">
      <div class="info">使用优惠码</div>
      <img src="meedu-assets/icon-prev.png" alt="">
    </section>
    <div class="spacer"></div>
    <footer class="box-footer">
      <div class="price-box">总计￥<span class="big">99</span></div>
      <button class="btn-submit" type="button" data-toast="提交订单">提交订单</button>
    </footer>
    <div class="mask" id="promoMask">
      <div class="popup">
        <input class="input-item" id="promoInput" placeholder="请输入优惠码">
        <button class="confirm" id="checkPromo" type="button">验证</button>
      </div>
    </div>
    <div id="toast" class="toast"></div>
  </main>
  <script>
    const toast = document.getElementById('toast');
    const promoMask = document.getElementById('promoMask');
    let timer = null;
    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove('show'), 1200);
    }
    document.querySelectorAll('[data-toast]').forEach((node) => node.addEventListener('click', () => showToast(node.getAttribute('data-toast'))));
    document.getElementById('promoBtn').addEventListener('click', () => promoMask.classList.add('show'));
    promoMask.addEventListener('click', (event) => { if (event.target === promoMask) promoMask.classList.remove('show'); });
    document.getElementById('checkPromo').addEventListener('click', () => {
      promoMask.classList.remove('show');
      showToast(document.getElementById('promoInput').value.trim() ? '优惠码已验证' : '请输入优惠码');
    });
  </script>
</body>
</html>
