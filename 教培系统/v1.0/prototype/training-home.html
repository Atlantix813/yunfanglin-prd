<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>教培系统学习首页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #fff;
      color: #171923;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body { overflow-x: hidden; }
    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      background: #fff;
      overflow: hidden;
    }
    .tabs-box {
      width: 100%;
      height: 40px;
      background: #fff;
      padding: 0 8px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .tabs {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      position: relative;
      flex: 0 0 auto;
      border: 0;
      background: transparent;
      color: rgba(0,0,0,.45);
      font-size: 16px;
      line-height: 22px;
      padding: 0;
    }
    .tab.active {
      color: rgba(0,0,0,.88);
      font-weight: 600;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -9px;
      width: 20px;
      height: 3px;
      margin-left: -10px;
      border-radius: 3px;
      background: #ff4d4f;
    }
    .category-content {
      width: 100%;
      background: #fff;
      padding: 20px 20px 0;
      position: sticky;
      top: 40px;
      z-index: 15;
      text-align: left;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }
    .category-trigger {
      width: 100%;
      height: 36px;
      border: 0;
      border-radius: 8px;
      background: #f7f7f7;
      color: rgba(0,0,0,.88);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }
    .category-arrow {
      color: rgba(0,0,0,.45);
      font-size: 12px;
    }
    .category-panel {
      display: none;
      width: calc(100% + 40px);
      margin: 16px 0 0 -20px;
      padding: 10px 20px 20px;
      background: #fff;
      box-shadow: 0 10px 20px rgba(15, 23, 42, .08);
    }
    .category-panel.show { display: block; }
    .category-item {
      width: 100%;
      color: rgba(0,0,0,.88);
      font-size: 14px;
      line-height: 30px;
      margin-bottom: 15px;
    }
    .category-item.active { color: #ff4d4f; }
    .child-item { padding-left: 20px; }
    .list-box {
      width: 100%;
      padding: 0 20px 75px;
      text-align: left;
    }
    .course-item {
      width: 100%;
      display: flex;
      align-items: center;
      padding-top: 30px;
    }
    .course-item:first-child { padding-top: 20px; }
    .thumb {
      width: 100px;
      height: 75px;
      border-radius: 8px;
      margin-right: 15px;
      position: relative;
      overflow: hidden;
      flex: 0 0 100px;
      background: linear-gradient(180deg, var(--c1), var(--c2));
    }
    .thumb::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 12px;
      width: 30px;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 0 rgba(255,255,255,.85), 10px 16px 0 rgba(255,255,255,.72);
    }
    .thumb::after {
      content: "";
      position: absolute;
      right: -14px;
      top: -8px;
      width: 58px;
      height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,.62);
    }
    .info {
      flex: 1;
      height: 75px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .title {
      width: 100%;
      height: 42px;
      font-size: 15px;
      font-weight: 400;
      color: rgba(0,0,0,.88);
      line-height: 21px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .status-content {
      width: 100%;
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .type, .active-type {
      width: 46px;
      height: 24px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      flex: 0 0 46px;
    }
    .type { background: rgba(255,77,79,.1); color: #ff4d4f; }
    .active-type { background: rgba(255,153,0,.1); color: #ff9900; }
    .progress-wrap { flex: 1; display: flex; align-items: center; min-width: 0; }
    .progress-track {
      flex: 1;
      height: 8px;
      border-radius: 8px;
      background: #f6f6f6;
      overflow: hidden;
    }
    .progress-fill {
      width: var(--p);
      height: 100%;
      border-radius: 8px;
      background: #ff4d4f;
    }
    .progress-text {
      height: 12px;
      font-size: 12px;
      line-height: 12px;
      margin-left: 10px;
      color: rgba(0,0,0,.45);
      white-space: nowrap;
    }
    .success {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #ff4d4f;
      line-height: 20px;
    }
    .medal {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffedd5;
      color: #ff4d4f;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 5px;
      font-size: 12px;
    }
    .sp-line {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,.05);
      margin-top: 20px;
    }
    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 430px;
      min-height: 55px;
      background: #fff;
      box-shadow: 0 -1px 4px rgba(0,0,0,.04);
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 30;
    }
    .foot-item {
      border: 0;
      background: transparent;
      padding: 6px 0 5px;
      color: #ccc;
      font-size: 11px;
      line-height: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .foot-item.active { color: #ff4d4f; }
    .foot-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .foot-icon svg { width: 24px; height: 24px; }
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(31,41,55,.92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: .18s;
      z-index: 40;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <main class="page">
    <section class="tabs-box">
      <div class="tabs">
        <button class="tab active">全部</button>
        <button class="tab">必修课</button>
        <button class="tab">选修课</button>
        <button class="tab">已学完</button>
        <button class="tab">未学完</button>
      </div>
    </section>

    <section class="category-content">
      <button class="category-trigger" onclick="toggleCategoryPanel()">
        <span id="categoryText">所有分类</span>
        <span class="category-arrow">▾</span>
      </button>
      <div class="category-panel" id="categoryPanel">
        <div class="category-item active" onclick="pickCategory('所有分类', this)">所有分类</div>
        <div class="category-item" onclick="pickCategory('社区治理', this)">社区治理</div>
        <div class="category-item child" onclick="pickCategory('矛盾调解', this)">矛盾调解</div>
        <div class="category-item child" onclick="pickCategory('居民协商', this)">居民协商</div>
        <div class="category-item" onclick="pickCategory('安全应急', this)">安全应急</div>
        <div class="category-item child" onclick="pickCategory('消防安全', this)">消防安全</div>
        <div class="category-item child" onclick="pickCategory('应急预案', this)">应急预案</div>
        <div class="category-item" onclick="pickCategory('便民服务', this)">便民服务</div>
      </div>
    </section>

    <section class="list-box">
      <div class="course-item">
        <div class="thumb" style="--c1:#35b3ff;--c2:#13b4a9;"></div>
        <div class="info">
          <div class="title">社区合伙人政策与准入规则</div>
          <div class="status-content">
            <div class="type">必修课</div>
            <div class="progress-wrap">
              <div class="progress-track"><div class="progress-fill" style="--p:86%;"></div></div>
              <span class="progress-text">86%</span>
            </div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="course-item">
        <div class="thumb" style="--c1:#7348ff;--c2:#c236c9;"></div>
        <div class="info">
          <div class="title">社区服务站日常巡查与记录规范</div>
          <div class="status-content">
            <div class="type">必修课</div>
            <div class="success"><span class="medal">✓</span><span>恭喜你学完此课程!</span></div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="course-item">
        <div class="thumb" style="--c1:#16b7c2;--c2:#2489c9;"></div>
        <div class="info">
          <div class="title">社区工作者情绪管理与职业倦怠预防</div>
          <div class="status-content">
            <div class="active-type">选修课</div>
            <div class="progress-wrap">
              <div class="progress-track"><div class="progress-fill" style="--p:42%;"></div></div>
              <span class="progress-text">42%</span>
            </div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="course-item">
        <div class="thumb" style="--c1:#18c46a;--c2:#16b7a2;"></div>
        <div class="info">
          <div class="title">基层党组织建设实务</div>
          <div class="status-content">
            <div class="type">必修课</div>
            <div class="progress-wrap">
              <div class="progress-track"><div class="progress-fill" style="--p:0%;"></div></div>
              <span class="progress-text">未学习</span>
            </div>
          </div>
        </div>
      </div>
      <div class="sp-line"></div>

      <div class="course-item">
        <div class="thumb" style="--c1:#ffa617;--c2:#ff6332;"></div>
        <div class="info">
          <div class="title">民法典与社区治理</div>
          <div class="status-content">
            <div class="active-type">选修课</div>
            <div class="progress-wrap">
              <div class="progress-track"><div class="progress-fill" style="--p:18%;"></div></div>
              <span class="progress-text">18%</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">
      <button class="foot-item active" onclick="toast('当前页：首页')">
        <span class="foot-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FF4D4F" stroke-width="1.9"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>
        </span>
        <span>首页</span>
      </button>
      <button class="foot-item" onclick="toast('跳转：学习')">
        <span class="foot-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="1.9"><path d="M4 5h7v14H4z"/><path d="M13 5h7v14h-7z"/><path d="M11 7h2M11 17h2"/></svg>
        </span>
        <span>学习</span>
      </button>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script>
    function toast(text) {
      var node = document.getElementById('toast');
      node.textContent = text;
      node.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () {
        node.classList.remove('show');
      }, 1200);
    }
    function toggleCategoryPanel() {
      document.getElementById('categoryPanel').classList.toggle('show');
    }
    function pickCategory(name, el) {
      document.getElementById('categoryText').textContent = name;
      document.querySelectorAll('.category-item').forEach(function (node) {
        node.classList.remove('active');
      });
      el.classList.add('active');
      document.getElementById('categoryPanel').classList.remove('show');
    }
  </script>
</body>
</html>
