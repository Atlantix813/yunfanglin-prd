<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>教培系统课程详情</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #fff;
      color: #171923;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body { overflow-x: hidden; }
    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0;
      background: #fff;
      overflow: hidden;
    }
    .main-header {
      width: 100%;
      height: 50px;
      background: #ff4d4f;
      padding: 0 20px;
      display: flex;
      align-items: center;
    }
    .back-icon {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      position: relative;
    }
    .back-icon::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 5px;
      width: 10px;
      height: 10px;
      border-left: 2px solid rgba(255,255,255,.95);
      border-bottom: 2px solid rgba(255,255,255,.95);
      transform: rotate(45deg);
    }
    .top-content {
      width: 100%;
      background: #ff4d4f;
      padding: 8px 20px 20px;
    }
    .title {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,.88);
      line-height: 24px;
      text-align: left;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .info-content {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .info { flex: 1; text-align: left; }
    .record {
      height: 20px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,.88);
      line-height: 20px;
      margin-top: 10px;
    }
    .record strong { font-size: 20px; }
    .type {
      height: 12px;
      font-size: 12px;
      color: #fff;
      line-height: 12px;
      margin-top: 20px;
    }
    .progress-box {
      width: 80px;
      height: 80px;
      position: relative;
      flex: 0 0 80px;
    }
    .circle-track,
    .circle-fill {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .circle-track {
      border: 7px solid rgba(255,255,255,.3);
    }
    .circle-fill {
      border: 7px solid transparent;
      border-top-color: #fff;
      border-right-color: #fff;
      transform: rotate(45deg);
    }
    .circle-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    .other-content {
      width: 100%;
      border-radius: 16px 16px 0 0;
      background: #fff;
      padding: 20px;
      margin-top: -20px;
      position: relative;
      z-index: 10;
    }
    .tabs {
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 36px;
      margin-bottom: 20px;
    }
    .tab {
      position: relative;
      border: 0;
      background: transparent;
      color: rgba(0,0,0,.45);
      font-size: 16px;
      line-height: 24px;
      padding: 0;
    }
    .tab.active {
      color: rgba(0,0,0,.88);
      font-weight: 600;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 20px;
      height: 3px;
      margin-left: -10px;
      border-radius: 2px;
      background: #ff4d4f;
    }
    .desc {
      width: 100%;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 18px;
      text-align: left;
    }
    .line {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,.05);
      margin-top: 20px;
    }
    .hours-list-box { width: 100%; display: flex; flex-direction: column; }
    .chapter-it { width: 100%; margin-top: 20px; }
    .chapter-name {
      width: 100%;
      font-size: 15px;
      font-weight: 500;
      color: rgba(0,0,0,.88);
      line-height: 15px;
      text-align: left;
      margin-bottom: 5px;
    }
    .hours-it { width: 100%; margin-top: 10px; }
    .hour-item {
      width: 100%;
      background: #fafafa;
      border-radius: 7px;
      padding: 10px;
      text-align: left;
    }
    .hour-top {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 16px;
    }
    .hour-label {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 16px;
    }
    .hour-status { color: #ff4d4f; font-size: 12px; line-height: 16px; }
    .hour-status.done { color: rgba(0,0,0,.45); }
    .video-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: rgba(0,0,0,.3);
      position: relative;
    }
    .video-dot::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 3px;
      width: 0;
      height: 0;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      border-left: 5px solid #fff;
    }
    .hour-title {
      width: 100%;
      margin-top: 15px;
      color: rgba(0,0,0,.88);
      font-size: 14px;
      line-height: 20px;
    }
    .panel { display: none; }
    .panel.show { display: block; }
    .attachments { display: none; }
    .attachments.show { display: block; }
    .attachments-item {
      width: 100%;
      height: 69px;
      background: #fafafa;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px 10px 10px;
      margin-bottom: 10px;
      text-align: left;
    }
    .attachments-item:last-child { margin-bottom: 0; }
    .left-cont { width: calc(100% - 34px); }
    .label {
      display: flex;
      align-items: center;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 16px;
    }
    .paper-icon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: rgba(0,0,0,.15);
      margin-right: 5px;
      position: relative;
    }
    .paper-icon::after {
      content: "";
      position: absolute;
      right: 2px;
      top: 2px;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,.7);
      transform: rotate(45deg);
    }
    .attach-title {
      margin-top: 14px;
      color: rgba(0,0,0,.88);
      font-size: 14px;
      line-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .download {
      color: #ff4d4f;
      font-size: 12px;
      line-height: 16px;
    }
    .toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(31,41,55,.92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      transition: .18s;
      z-index: 50;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <main class="page">
    <div class="main-header">
      <button class="back-icon" onclick="toast('返回上一页')"></button>
    </div>

    <section class="top-content">
      <div class="title">社区矛盾调解沟通技巧</div>
      <div class="info-content">
        <div class="info">
          <div class="record">已学完课时 <strong>2</strong> / 6</div>
          <div class="type">必修课</div>
        </div>
        <div class="progress-box">
          <div class="circle-track"></div>
          <div class="circle-fill"></div>
          <div class="circle-num">33%</div>
        </div>
      </div>
    </section>

    <section class="other-content">
      <div class="tabs">
        <button class="tab active" onclick="showTab('catalog', this)">课程目录</button>
        <button class="tab" onclick="showTab('attach', this)">课程附件</button>
      </div>

      <div id="catalog" class="panel show">
        <div class="desc">面向社区工作人员和志愿者，学习邻里纠纷沟通、事实记录和调解跟进，适合按章节逐步完成。</div>
        <div class="line"></div>
        <div class="hours-list-box">
          <div class="chapter-it">
            <div class="chapter-name">第一章 调解前准备</div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status">学习到00:10:18</div>
                </div>
                <div class="hour-title">识别矛盾类型与当事人诉求 (00:18)</div>
              </div>
            </div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status done">已学完</div>
                </div>
                <div class="hour-title">调解现场的开场话术 (00:18)</div>
              </div>
            </div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status done">已学完</div>
                </div>
                <div class="hour-title">事实记录与证据保留 (00:18)</div>
              </div>
            </div>
          </div>

          <div class="chapter-it">
            <div class="chapter-name">第二章 沟通与收尾</div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status">学习到00:03:40</div>
                </div>
                <div class="hour-title">情绪安抚与共情表达 (00:20)</div>
              </div>
            </div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status done">已学完</div>
                </div>
                <div class="hour-title">方案协商与责任确认 (00:20)</div>
              </div>
            </div>
            <div class="hours-it">
              <div class="hour-item">
                <div class="hour-top">
                  <div class="hour-label"><span class="video-dot"></span><span>视频</span></div>
                  <div class="hour-status done">已学完</div>
                </div>
                <div class="hour-title">回访安排与结果归档 (00:20)</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="attach" class="attachments">
        <div class="attachments-item">
          <div class="left-cont">
            <div class="label"><span class="paper-icon"></span><span>课件</span></div>
            <div class="attach-title">调解记录模板.docx</div>
          </div>
          <div class="download" onclick="toast('下载课件')">下载</div>
        </div>
        <div class="attachments-item">
          <div class="left-cont">
            <div class="label"><span class="paper-icon"></span><span>课件</span></div>
            <div class="attach-title">沟通案例清单.pdf</div>
          </div>
          <div class="download" onclick="toast('下载课件')">下载</div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script>
    function toast(text) {
      var node = document.getElementById('toast');
      node.textContent = text;
      node.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function () {
        node.classList.remove('show');
      }, 1200);
    }
    function showTab(id, el) {
      document.querySelectorAll('.tab').forEach(function (node) { node.classList.remove('active'); });
      document.querySelectorAll('.panel, .attachments').forEach(function (node) { node.classList.remove('show'); });
      el.classList.add('active');
      document.getElementById(id).classList.add('show');
    }
  </script>
</body>
</html>
