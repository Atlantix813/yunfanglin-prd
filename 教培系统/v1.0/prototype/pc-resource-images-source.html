<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1" />
  <title>资源管理-图片库</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1920px;
      min-height: 1080px;
      margin: 0;
      background: #eef2f7;
      overflow: hidden;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    .yun-shell { width: 1920px; min-height: 1080px; background: #f7f8fa; }
    .yun-top {
      height: 48px; background: #3491fa; color: #fff; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; font-size: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .yun-brand { width: 180px; display: flex; align-items: center; gap: 12px; font-weight: 600; letter-spacing: .5px; }
    .hamburger { width: 20px; height: 20px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
    .hamburger span { display: block; width: 18px; height: 2px; background: #fff; border-radius: 1px; }
    .yun-user { display: flex; align-items: center; gap: 20px; font-size: 13px; }
    .yun-user span { display: inline-flex; align-items: center; height: 28px; padding: 0 8px; border-radius: 4px; }
    .yun-body { display: flex; min-height: 1032px; }
    .yun-menu {
      width: 180px; background: #fff; border-right: 1px solid #e5e6eb; color: #4b5563; padding: 10px 0; flex-shrink: 0;
    }
    .yun-menu-title { height: 32px; display: flex; align-items: center; padding: 0 16px; color: #a9aeb8; font-size: 12px; }
    .yun-item { height: 44px; display: flex; align-items: center; gap: 10px; padding: 0 12px 0 16px; color: #4e5969; font-size: 14px; }
    .yun-item.active { background: #3491fa; color: #fff; }
    .yun-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .embed { flex: 1; min-width: 0; display: flex; background: #f1f2f9; }
    .meedu-side {
      width: 200px; height: 1032px; background: #fff; display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #f2f3f5;
    }
    .meedu-logo { position: sticky; top: 0; height: 56px; z-index: 10; background: #fff; display: flex; align-items: center; }
    .meedu-logo img { width: 128px; height: auto; max-height: 52px; object-fit: contain; margin-left: 20px; }
    .meedu-menu { width: 200px; height: 100%; overflow-y: auto; overflow-x: hidden; padding-top: 22px; background: #fff; color: rgba(0,0,0,.88); font-size: 14px; }
    .meedu-item, .meedu-sub-title {
      height: 56px; line-height: 56px; padding-left: 24px; padding-right: 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: rgba(0,0,0,.88); border-radius: 0;
    }
    .meedu-sub-title { justify-content: space-between; }
    .meedu-label { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .meedu-item.child { padding-left: 74px; font-size: 14px; color: rgba(0,0,0,.88); }
    .meedu-item.selected { background: #3b9df6; color: #fff; }
    .meedu-item.child.selected { background: #3b9df6; color: #fff; }
    .meedu-icon { width: 16px; height: 16px; color: #606266; flex: 0 0 auto; }
    .arrow { font-size: 10px; color: rgba(0,0,0,.45); }
    .meedu-main { width: calc(100% - 200px); display: flex; flex-direction: column; background: #f1f2f9; min-width: 0; }
    .meedu-head {
      width: 100%; height: 56px; background: #fff; z-index: 10; display: flex; align-items: center; justify-content: space-between;
    }
    .meedu-title { flex: 1; padding-left: 30px; font-size: 20px; font-weight: 600; color: #333; line-height: 56px; text-align: left; }
    .meedu-actions { display: flex; align-items: center; padding-right: 30px; gap: 18px; color: #606266; font-size: 14px; }
    .meedu-content { height: calc(1032px - 56px); padding: 20px; overflow-x: auto; overflow-y: auto; flex: 1; }
    .panel {
      width: 100%; min-width: 1180px; background-color: #fff; padding: 30px; border-radius: 15px; margin-bottom: 24px; min-height: calc(100% - 40px); box-shadow: 0 2px 4px rgba(102,102,102,.05); text-align: left;
    }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; min-height: 32px; }
    .btn {
      height: 32px; padding: 4px 15px; border: 1px solid #d9d9d9; background: #fff; border-radius: 3px;
      color: rgba(0,0,0,.88); cursor: pointer; font-size: 14px; font-family: inherit; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn.primary { border: none; background: #3ca7fa; color: #fff; box-shadow: none; }
    .btn.danger { color: #ff4d4f; border-color: #ffccc7; }
    .btn.disabled { color: rgba(0,0,0,.25); border-color: #d9d9d9; background: #f5f5f5; cursor: not-allowed; }
    .btn + .btn { margin-left: 10px; }
    .resource-row { display: grid; grid-template-columns: 12.5% 1fr; min-height: 760px; }
    .category-box {
      width: 100%; height: 100%; box-sizing: border-box; border-right: 1px solid #d8d8d8; border-radius: 3px;
    }
    .category-item {
      width: 100%; box-sizing: border-box; padding: 15px 30px; cursor: pointer; font-size: 15px; line-height: 15px; color: #333;
    }
    .category-item.active { background-color: rgba(60, 167, 250, 0.1); color: #333; }
    .image-area { padding-left: 24px; box-sizing: border-box; min-width: 0; }
    .images-box { display: grid; gap: 24px; grid-template-columns: repeat(8, minmax(0, 1fr)); }
    .image-item {
      width: 100%; aspect-ratio: 1/1; background-repeat: no-repeat; background-size: cover; background-position: center center;
      background-color: #f6f6f6; border-radius: 6px; overflow: hidden; position: relative; cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.03);
    }
    .image-item:hover { opacity: .8; }
    .image-item:hover .checkbox { display: block; }
    .checkbox {
      display: none; width: 20px; height: 20px; background: rgba(255,255,255,.6); border-radius: 3px;
      border: 2px solid #d9d9d9; position: absolute; left: 10px; top: 10px; z-index: 2;
    }
    .checked {
      width: 20px; height: 20px; background: #3ca7fa; border-radius: 3px; border: 2px solid #3ca7fa;
      position: absolute; left: 10px; top: 10px; z-index: 3; display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .checked::after { content: "✓"; font-size: 14px; line-height: 14px; }
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding-top: 24px; color: rgba(0,0,0,.65); font-size: 14px; }
    .page-btn {
      min-width: 32px; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; display: inline-flex;
      align-items: center; justify-content: center; background: #fff;
    }
    .page-btn.active { background: #409eff; color: #fff; border-color: #409eff; }
    .preview-mask {
      display: none; position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,.45); align-items: center; justify-content: center;
    }
    .preview-mask.show { display: flex; }
    .preview-box { width: 620px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,.2); }
    .preview-head { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid #f0f0f0; font-weight: 600; }
    .preview-close { font-size: 22px; color: #909399; cursor: pointer; }
    .preview-image { width: 100%; height: 380px; background: #f6f6f6; display: flex; align-items: center; justify-content: center; }
    .preview-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
    /* yfl-menu-bg-normalize:start */
    .yfl-body { min-height: 1032px; align-items: stretch; }
    .embed-area { min-height: 1032px; }
    .embed, .meedu-frame { height: 1032px; min-height: 1032px; align-items: stretch; background: #f1f2f9; overflow: hidden; }
    .meedu-side, .meedu-left { width: 200px !important; min-width: 200px; height: 1032px !important; min-height: 1032px; background: #fff; flex-shrink: 0; }
    .meedu-logo, .meedu-logo-wrap { height: 56px !important; min-height: 56px; display: flex; align-items: center; background: #fff; }
    .meedu-menu, .meedu-menu-box { width: 200px !important; height: calc(1032px - 56px) !important; min-height: calc(1032px - 56px); overflow-y: auto; overflow-x: hidden; padding-top: 24px !important; background: #fff; font-size: 14px; }
    .ant-menu, .meedu-menu { width: 200px !important; background: #fff; }
    .ant-menu-item, .ant-submenu-title, .meedu-item, .meedu-sub-title, .meedu-sub { height: 56px !important; min-height: 56px; line-height: 56px !important; padding: 0 16px 0 24px !important; display: flex; align-items: center; justify-content: space-between; gap: 10px; color: rgba(0,0,0,.88); border-radius: 0; font-size: 14px; }
    .ant-menu-item.child, .meedu-item.child { height: 50px !important; min-height: 50px; line-height: 50px !important; padding-left: 74px !important; padding-right: 16px !important; justify-content: flex-start; color: rgba(0,0,0,.88); }
    .ant-menu-item.selected, .meedu-item.selected, .ant-menu-item.child.selected, .meedu-item.child.selected { background: #3ca7fa !important; color: #fff !important; font-weight: 500; }
    .ant-submenu-title.open, .meedu-sub-title.open, .meedu-sub.open { color: #409eff; }
    .ant-menu-icon-label, .meedu-label { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .menu-icon, .meedu-icon { width: 16px; height: 16px; flex: 0 0 auto; color: #606266; }
    .ant-menu-arrow, .arrow { font-size: 12px; color: rgba(0,0,0,.45); }
    .meedu-frame > .meedu-main, .embed > .meedu-main, .meedu-right { height: 1032px !important; min-height: 1032px; background: #f1f2f9; display: flex; flex-direction: column; min-width: 0; }
    .meedu-content, .content, .meedu-right > .meedu-main { height: calc(1032px - 56px) !important; min-height: calc(1032px - 56px); background: #f1f2f9; overflow: auto; flex: 1 1 auto; }
    .panel, .meedu-main-body, .work-grid { margin-bottom: 80px; }
    .panel, .meedu-main-body { display: flow-root; }
    /* yfl-menu-bg-normalize:end */
  </style>
</head>
<body>
  <div class="yun-shell">
    <header class="yun-top">
      <div class="yun-brand">云芳邻管理后台 <div class="hamburger"><span></span><span></span><span></span></div></div>
      <div class="yun-user"><span>白云区运营中心</span><span>消息</span><span>平台管理员</span></div>

    <div class="yun-body">
      <aside class="yun-menu">
        <div class="yun-menu-title">云芳邻后台</div>

        <div class="yun-item active"><svg class="yun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg><span>教培系统</span></div>
        <div class="yun-item"><svg class="yun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg><span>数据看板</span></div>

      <section class="embed">

          <div class="meedu-logo"><img src="./meedu-admin-assets/logo.png" alt="YUWAY"></div>
          <nav class="meedu-menu">
  <div class="meedu-item"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>主页</span></span></div>
  <div class="meedu-sub-title open"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg><span>资源</span></span><span class="arrow">⌄</span></div>
  <div class="meedu-item child selected">图片库</div>
  <div class="meedu-item child">视频库</div>
  <div class="meedu-sub-title"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg><span>课程</span></span><span class="arrow">›</span></div>
  <div class="meedu-sub-title"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/></svg><span>学员</span></span><span class="arrow">›</span></div>
  <div class="meedu-sub-title"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/></svg><span>运营</span></span><span class="arrow">›</span></div>
  <div class="meedu-sub-title"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg><span>数据</span></span><span class="arrow">›</span></div>
  <div class="meedu-sub-title"><span class="meedu-label"><svg class="meedu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4"/></svg><span>系统</span></span><span class="arrow">›</span></div>
</nav>
        </aside>

        <main class="meedu-main">
          <div class="meedu-head">
            <div class="meedu-title">图片库</div>
            <div class="meedu-actions"><span>访问学员端</span><span>YUWAY ▾</span></div>
          </div>
          <div class="meedu-content">
            <div class="panel">
              <div class="toolbar">
                <div>
                  <button class="btn primary">上传图片</button>
                  <button class="btn danger disabled" id="deleteBtn">删除</button>
                </div>
                <div></div>
              </div>
              <div class="resource-row">
                <aside class="category-box">
                  <div class="category-item active">全部图片</div>
                  <div class="category-item">课程封面</div>
                  <div class="category-item">学员头像</div>
                  <div class="category-item">文本编辑器</div>
                  <div class="category-item">其它</div>
                </aside>
                <section class="image-area">
                  <div class="images-box">
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-19.png" style="background-image:url('./meedu-admin-assets/course-cover-19.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-18.png" style="background-image:url('./meedu-admin-assets/course-cover-18.png')"><i class="checkbox"></i></div>
                    <div class="image-item selected" data-src="./meedu-admin-assets/course-cover-17.png" style="background-image:url('./meedu-admin-assets/course-cover-17.png')"><i class="checked"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-16.png" style="background-image:url('./meedu-admin-assets/course-cover-16.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-15.png" style="background-image:url('./meedu-admin-assets/course-cover-15.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-14.png" style="background-image:url('./meedu-admin-assets/course-cover-14.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-13.png" style="background-image:url('./meedu-admin-assets/course-cover-13.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-19.png" style="background-image:url('./meedu-admin-assets/course-cover-19.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-18.png" style="background-image:url('./meedu-admin-assets/course-cover-18.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-17.png" style="background-image:url('./meedu-admin-assets/course-cover-17.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-16.png" style="background-image:url('./meedu-admin-assets/course-cover-16.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-15.png" style="background-image:url('./meedu-admin-assets/course-cover-15.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-14.png" style="background-image:url('./meedu-admin-assets/course-cover-14.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-13.png" style="background-image:url('./meedu-admin-assets/course-cover-13.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-19.png" style="background-image:url('./meedu-admin-assets/course-cover-19.png')"><i class="checkbox"></i></div>
                    <div class="image-item" data-src="./meedu-admin-assets/course-cover-18.png" style="background-image:url('./meedu-admin-assets/course-cover-18.png')"><i class="checkbox"></i></div>
                  </div>
                  <div class="pagination"><span>共 42 条</span><span class="page-btn">‹</span><span class="page-btn active">1</span><span class="page-btn">2</span><span class="page-btn">›</span><span class="page-btn" style="width:auto;padding:0 12px;">32 条/页</span></div>

        </main>

    </div>
  </div>
  <div class="preview-mask" id="previewMask">
    <div class="preview-box">
      <div class="preview-head"><span>图片预览</span><span class="preview-close" id="previewClose">×</span></div>
      <div class="preview-image"><img id="previewImg" src="./meedu-admin-assets/course-cover-19.png" alt="图片预览"></div>
    </div>
  </div>
  <script>
    const categories = document.querySelectorAll('.category-item');
    const images = document.querySelectorAll('.image-item');
    const deleteBtn = document.getElementById('deleteBtn');
    const previewMask = document.getElementById('previewMask');
    const previewImg = document.getElementById('previewImg');
    const previewClose = document.getElementById('previewClose');

    categories.forEach(item => {
      item.addEventListener('click', () => {
        categories.forEach(node => node.classList.remove('active'));
        item.classList.add('active');
      });
    });

    images.forEach(item => {
      item.addEventListener('click', () => {
        if (item.classList.contains('selected')) {
          item.classList.remove('selected');
          item.innerHTML = '<i class="checkbox"></i>';
        } else {
          previewImg.src = item.dataset.src;
          previewMask.classList.add('show');
        }
        const hasSelected = document.querySelectorAll('.image-item.selected').length > 0;
        deleteBtn.classList.toggle('disabled', !hasSelected);
      });
    });

    previewClose.addEventListener('click', () => previewMask.classList.remove('show'));
    previewMask.addEventListener('click', event => {
      if (event.target === previewMask) previewMask.classList.remove('show');
    });
  </script>
</body>
</html>
