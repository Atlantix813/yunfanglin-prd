<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>赚积分（废弃）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',-apple-system,sans-serif; background:#F4F8FF; color:#222835; font-size:14px; width:375px; min-height:812px; overflow-y:scroll; }
body::-webkit-scrollbar { display:none; }

.status-bar { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#222835; }
.status-bar .time { font-family:Inter,sans-serif; font-weight:700; font-size:15px; }
.nav-bar { height:44px; display:flex; align-items:center; justify-content:center; position:relative; }
.nav-bar .back { position:absolute; left:16px; font-size:22px; color:#222835; cursor:pointer; }
.nav-bar .title { font-size:17px; font-weight:700; color:#222835; }
.nav-bar .capsule { position:absolute; right:8px; height:32px; width:87px; border-radius:16px; border:0.5px solid rgba(0,0,0,0.1); background:rgba(0,0,0,0.05); display:flex; align-items:center; justify-content:center; }
.capsule-dots { flex:1; display:flex; align-items:center; justify-content:center; gap:3px; }
.capsule-dots span { width:4px; height:4px; border-radius:2px; background:#222835; }
.capsule-divider { width:0.5px; height:16px; background:rgba(0,0,0,0.15); }

/* Banner */
.banner { position:relative; margin:0 16px; height:160px; background:linear-gradient(135deg, #5395FF, #296CFF); border-radius:16px; overflow:hidden; padding:24px 20px; }
.banner-title { font-size:24px; font-weight:700; color:#fff; }
.banner-coin { position:absolute; right:20px; top:30px; width:100px; height:100px; }
.banner-coin-inner { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, #FFD700, #FFA500); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(255,165,0,0.4); }
.banner-coin-star { font-size:36px; color:#FF8C00; }
.banner-deco1 { position:absolute; right:60px; top:20px; width:120px; height:100px; opacity:0.12; }
.banner-deco2 { position:absolute; left:100px; top:60px; width:80px; height:60px; opacity:0.08; }

/* Invite Card */
.invite-card { margin:0 16px; margin-top:-30px; position:relative; z-index:10; background:#fff; border-radius:14px; padding:16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 16px rgba(0,0,0,0.06); }
.invite-left { display:flex; align-items:center; gap:12px; }
.invite-icon { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg, #4A90F7, #3168D4); display:flex; align-items:center; justify-content:center; }
.invite-info {}
.invite-name { font-size:15px; font-weight:700; color:#222835; white-space:nowrap; }
.invite-name span { color:#FF5A00; font-size:13px; font-weight:500; }
.invite-stat { font-size:12px; color:#939CAB; margin-top:3px; white-space:nowrap; }
.invite-btn { height:34px; padding:0 20px; background:linear-gradient(135deg, #FF7E66, #FFA424); color:#fff; font-size:14px; font-weight:700; border-radius:17px; display:flex; align-items:center; cursor:pointer; box-shadow:0 4px 10px rgba(255,164,36,0.3); white-space:nowrap; flex-shrink:0; }

/* Newbie Tasks */
.newbie-card { margin:12px 16px 0; background:#fff; border-radius:14px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
.newbie-title { font-size:16px; font-weight:700; color:#222835; margin-bottom:12px; }
.newbie-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; }
.newbie-name { font-size:14px; color:#4B5563; }
.newbie-points { font-size:14px; color:#FF9D19; font-weight:600; display:flex; align-items:center; gap:4px; }
.newbie-check { width:24px; height:24px; border-radius:50%; background:#34C96E; display:flex; align-items:center; justify-content:center; }
.newbie-check svg { width:14px; height:14px; }

/* Deprecated overlay */
.deprecated-banner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-30deg); font-size:48px; font-weight:900; color:rgba(255,0,0,0.08); white-space:nowrap; z-index:100; pointer-events:none; letter-spacing:12px; }

.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); background:rgba(34,40,53,0.88); color:#fff; padding:14px 24px; border-radius:12px; font-size:14px; font-weight:700; z-index:200; opacity:0; transition:all 0.3s ease; pointer-events:none; }
.toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<div class="deprecated-banner">本版本废弃</div>

<div class="status-bar">
  <span class="time">9:41</span>
  <div style="display:flex;gap:5px;align-items:center;">
    <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#222"/><rect x="4" y="4" width="3" height="6" rx="0.5" fill="#222"/><rect x="8" y="2" width="3" height="8" rx="0.5" fill="#222"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="#222"/></svg>
    <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2" fill="none" stroke="#222"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#222"/><rect x="20" y="3" width="1.5" height="4" rx="0.5" fill="#222"/></svg>
  </div>
</div>

<div class="nav-bar">
  <span class="back">&#8249;</span>
  <span class="title">赚积分</span>
  <div class="capsule">
    <div class="capsule-dots"><span></span><span></span><span></span></div>
    <div class="capsule-divider"></div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
  </div>
</div>

<!-- Banner -->
<div class="banner">
  <div class="banner-title">赚积分</div>
  <svg class="banner-deco1" viewBox="0 0 80 60" fill="#fff"><path d="M60 30a15 15 0 00-28.5-6.5A10 10 0 0015 30a10 10 0 000 20h45a10 10 0 000-20z"/></svg>
  <svg class="banner-deco2" viewBox="0 0 80 60" fill="#fff"><path d="M60 30a15 15 0 00-28.5-6.5A10 10 0 0015 30a10 10 0 000 20h45a10 10 0 000-20z"/></svg>
  <div class="banner-coin">
    <div class="banner-coin-inner">
      <span class="banner-coin-star">&#9733;</span>
    </div>
  </div>
</div>

<!-- Invite Card -->
<div class="invite-card">
  <div class="invite-left">
    <div class="invite-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M16 11h6M19 8v6"/></svg>
    </div>
    <div class="invite-info">
      <div class="invite-name">邀请新用户 <span>(奖励50积分/人)</span></div>
      <div class="invite-stat">已邀请1人，已赚取50积分</div>
    </div>
  </div>
  <div class="invite-btn" onclick="showToast('跳转邀请页')">去邀请</div>
</div>

<!-- Newbie Tasks -->
<div class="newbie-card">
  <div class="newbie-title">新手任务</div>
  <div class="newbie-item">
    <span class="newbie-name">1、注册成功</span>
    <span class="newbie-points">&#x1F3C6; 积分+10</span>
    <div class="newbie-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}
</script>
</body>
</html>
