<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>邀请</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { overscroll-behavior:contain; }
body { font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif; background:#F4F8FF; color:#222835; font-size:14px; width:375px; min-height:812px; overscroll-behavior:contain; -ms-overflow-style:none; scrollbar-width:none; overflow-y:scroll; padding-bottom:40px; }
body::-webkit-scrollbar { display:none; }

/* === Status Bar === */
.status-bar { position:relative; z-index:50; height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#fff; }
.status-bar .time { font-family:Inter,sans-serif; font-weight:700; font-size:15px; }

/* === Nav Bar === */
.nav-bar { position:relative; z-index:50; height:44px; display:flex; align-items:center; justify-content:center; }
.nav-bar .back { position:absolute; left:16px; font-size:24px; color:#fff; cursor:pointer; font-weight:500; }
.nav-bar .title { font-size:17px; font-weight:700; color:#fff; }
.nav-bar .capsule { position:absolute; right:8px; height:32px; width:87px; border-radius:16px; border:0.5px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; }
.capsule-dots { flex:1; display:flex; align-items:center; justify-content:center; gap:3px; }
.capsule-dots span { width:4px; height:4px; border-radius:2px; background:#fff; }
.capsule-divider { width:0.5px; height:16px; background:rgba(255,255,255,0.4); }
.capsule-close { flex:1; display:flex; align-items:center; justify-content:center; }

/* === Hero Banner === */
.hero-banner {
  position:relative;
  width:375px;
  margin-top:-88px; /* pull behind status+nav */
  padding-top:88px; /* compensate */
  min-height:380px;
  background:linear-gradient(160deg, #5395FF 0%, #296CFF 100%);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.hero-banner::before {
  content:'';
  position:absolute; top:-40px; right:-60px;
  width:240px; height:240px; border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.hero-banner::after {
  content:'';
  position:absolute; bottom:30px; left:-40px;
  width:160px; height:160px; border-radius:50%;
  background:rgba(255,255,255,0.04);
}

.hero-title {
  margin-top:16px;
  font-size:30px; font-weight:700; color:#fff;
  letter-spacing:2px; text-align:center;
  text-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.hero-pill {
  margin-top:10px;
  display:inline-flex; align-items:center;
  background:rgba(255,255,255,0.95); color:#296CFF;
  font-size:13px; font-weight:600;
  padding:6px 18px; border-radius:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* === Envelope Decoration === */
.envelope-wrap {
  position:relative;
  margin-top:20px;
  width:200px; height:160px;
  z-index:1;
}
/* Red envelope body */
.envelope {
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:140px; height:110px;
  background:linear-gradient(160deg, #FF5A47 0%, #E83830 60%, #CC2B2B 100%);
  border-radius:14px;
  box-shadow:0 8px 28px rgba(200,40,40,0.35);
  overflow:hidden;
}
.envelope::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:40px;
  background:linear-gradient(180deg, #FF7E66 0%, #FF5A47 100%);
  border-radius:14px 14px 0 0;
}
.envelope::after {
  content:'';
  position:absolute; top:28px; left:50%; transform:translateX(-50%);
  width:30px; height:30px; border-radius:50%;
  background:linear-gradient(135deg, #FFD700, #FFAA00);
  box-shadow:0 2px 8px rgba(255,170,0,0.4);
  z-index:2;
}
.envelope-number {
  position:absolute; top:65px; left:0; right:0;
  text-align:center; z-index:2;
  font-family:Inter,sans-serif; font-size:36px; font-weight:800;
  color:#FFE4B5;
  text-shadow:0 2px 4px rgba(0,0,0,0.15);
}
.envelope-label {
  position:absolute; bottom:10px; left:0; right:0;
  text-align:center; z-index:2;
  font-size:11px; color:rgba(255,255,255,0.85); font-weight:500;
}

/* Gold coin large - right of envelope */
.coin-large {
  position:absolute; right:4px; top:20px;
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(145deg, #FFD700 0%, #FFA500 100%);
  box-shadow:0 4px 16px rgba(255,165,0,0.45);
  display:flex; align-items:center; justify-content:center;
  animation:coinBounce 2.5s ease-in-out infinite;
}
.coin-large::before {
  content:''; position:absolute; inset:4px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
}
.coin-star { font-size:22px; color:#B8860B; }

/* Scatter coins */
.coin-sm {
  position:absolute; border-radius:50%;
  background:linear-gradient(145deg, #FFD700, #FFA500);
  box-shadow:0 2px 6px rgba(255,165,0,0.3);
}
.coin-sm-1 { width:20px; height:20px; left:10px; top:15px; animation:coinFloat1 3s ease-in-out infinite; }
.coin-sm-2 { width:14px; height:14px; left:30px; top:65px; animation:coinFloat2 2.6s ease-in-out infinite 0.3s; }
.coin-sm-3 { width:16px; height:16px; right:20px; bottom:10px; animation:coinFloat1 2.8s ease-in-out infinite 0.6s; }
.coin-sm-4 { width:12px; height:12px; left:22px; bottom:20px; animation:coinFloat2 3.2s ease-in-out infinite 0.9s; }
.coin-sm-5 { width:10px; height:10px; right:40px; top:10px; animation:coinFloat1 2.4s ease-in-out infinite 0.4s; }

@keyframes coinBounce {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-6px); }
}
@keyframes coinFloat1 {
  0%,100% { transform:translateY(0) rotate(0deg); opacity:0.9; }
  50% { transform:translateY(-8px) rotate(15deg); opacity:1; }
}
@keyframes coinFloat2 {
  0%,100% { transform:translateY(0) rotate(0deg); opacity:0.8; }
  50% { transform:translateY(-6px) rotate(-10deg); opacity:1; }
}

/* Sparkle dots */
.sparkle {
  position:absolute; width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,0.7);
  animation:sparkle 2s ease-in-out infinite;
}
.sparkle-1 { left:40px; top:45px; animation-delay:0s; }
.sparkle-2 { right:30px; top:70px; animation-delay:0.5s; }
.sparkle-3 { left:60px; bottom:25px; animation-delay:1s; }
.sparkle-4 { right:55px; bottom:40px; animation-delay:1.5s; }
@keyframes sparkle {
  0%,100% { opacity:0; transform:scale(0.5); }
  50% { opacity:1; transform:scale(1.2); }
}

/* === Invite Code Card === */
.invite-card {
  position:relative; z-index:10;
  margin:-32px 20px 0;
  background:#fff;
  border-radius:16px;
  padding:24px 20px 28px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
  text-align:center;
}
.invite-card-label {
  font-size:14px; color:#939CAB; font-weight:500;
}
.invite-code-row {
  display:flex; align-items:center; justify-content:center;
  margin-top:10px; gap:10px;
}
.invite-code {
  font-family:Inter,sans-serif;
  font-size:32px; font-weight:800; color:#222835;
  letter-spacing:4px;
}
.copy-btn {
  display:inline-flex; align-items:center; gap:4px;
  font-size:13px; font-weight:600; color:#3F86F5;
  cursor:pointer; padding:6px 12px;
  border-radius:8px; background:#EEF4FF;
  transition:background 0.2s;
}
.copy-btn:active { background:#D9E7FF; }
.invite-hint {
  margin-top:14px;
  font-size:12px; color:#B0B8C8; line-height:1.5;
}

/* QR Code area */
.qr-area {
  margin-top:20px;
  display:flex; justify-content:center;
  cursor:pointer;
}
.qr-box {
  width:160px; height:160px;
  border:2px solid #E8EEF8;
  border-radius:12px;
  padding:12px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  background:#fff;
}
/* Corner accents */
.qr-box::before, .qr-box::after {
  content:''; position:absolute; width:20px; height:20px;
  border-color:#3F86F5; border-style:solid;
}
.qr-box::before { top:-1px; left:-1px; border-width:3px 0 0 3px; border-radius:8px 0 0 0; }
.qr-box::after { top:-1px; right:-1px; border-width:3px 3px 0 0; border-radius:0 8px 0 0; }
.qr-corner-bl, .qr-corner-br {
  position:absolute; width:20px; height:20px;
  border-color:#3F86F5; border-style:solid;
}
.qr-corner-bl { bottom:-1px; left:-1px; border-width:0 0 3px 3px; border-radius:0 0 0 8px; }
.qr-corner-br { bottom:-1px; right:-1px; border-width:0 3px 3px 0; border-radius:0 0 8px 0; }

/* === Stats Card === */
.stats-card {
  margin:12px 20px 0;
  background:#fff;
  border-radius:16px;
  padding:16px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.stats-title-row {
  display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;
}
.stats-title {
  font-size:16px; font-weight:700; color:#222835;
}
.stats-summary {
  font-size:12px; color:#FF9D19; font-weight:500;
}

/* === Toast === */
.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); background:rgba(34,40,53,0.88); color:#fff; padding:14px 24px; border-radius:12px; font-size:14px; font-weight:700; z-index:200; opacity:0; transition:all 0.3s ease; pointer-events:none; text-align:center; white-space:nowrap; }
.toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
</style>
</head>

<script>
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}
function copyCode() {
