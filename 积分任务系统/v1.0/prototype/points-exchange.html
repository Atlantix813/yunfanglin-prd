<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>积分兑换</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { overscroll-behavior:contain; }
body { font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif; background:#F2F6FF; color:#222835; font-size:14px; width:375px; overscroll-behavior:contain; -ms-overflow-style:none; scrollbar-width:none; }
body::-webkit-scrollbar { display:none; }

.status-bar { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; }
.status-bar .time { font-family:Inter,sans-serif; font-weight:700; font-size:15px; }
.nav-bar { height:44px; display:flex; align-items:center; justify-content:center; position:relative; }
.nav-bar .back { position:absolute; left:16px; font-size:24px; color:#222835; font-weight:500; }
.nav-bar .title { font-size:17px; font-weight:700; }
.nav-bar .capsule { position:absolute; right:8px; height:32px; width:87px; border-radius:16px; border:0.5px solid rgba(0,0,0,0.1); background:rgba(255,255,255,0.55); display:flex; align-items:center; justify-content:center; }
.capsule-dots { flex:1; display:flex; align-items:center; justify-content:center; gap:3px; }
.capsule-dots span { width:4px; height:4px; border-radius:2px; background:#222835; }
.capsule-divider { width:0.5px; height:16px; background:rgba(0,0,0,0.15); }
.capsule-close { flex:1; display:flex; align-items:center; justify-content:center; }

/* Banner */
.banner { margin:12px 16px 0; border-radius:12px; overflow:hidden; }
.banner img { width:100%; display:block; }

/* Info bar */
.info-bar { display:flex; align-items:center; padding:14px 16px 6px; gap:8px; }
.community { font-size:14px; font-weight:600; display:flex; align-items:center; gap:4px; }
.balance-row { display:flex; align-items:center; padding:0 16px 12px; gap:8px; }
.balance-label { font-size:13px; color:#939CAB; }
.balance-value { font-size:18px; font-weight:700; color:#FF9D19; font-family:Inter,sans-serif; }
.btn-earn { height:26px; padding:0 10px; border-radius:13px; border:1px solid #3F86F5; background:#EBF5FF; color:#3F86F5; font-size:11px; font-weight:600; cursor:pointer; margin-left:4px; }
.record-link { margin-left:auto; font-size:13px; color:#4B5563; display:flex; align-items:center; gap:4px; }

/* Promo bar */
.promo-bar { margin:0 16px 12px; background:#FFF8F0; border-radius:10px; padding:10px; text-align:center; font-size:13px; color:#FF8C00; font-weight:500; }

/* Product list */
.product-list { padding:0 16px 24px; }
.product-card { background:#fff; border-radius:14px; padding:14px; margin-bottom:12px; box-shadow:0 2px 6px rgba(30,50,90,0.05); display:flex; gap:12px; }
.product-img { width:100px; height:100px; border-radius:10px; background:#F7F8FA; flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.product-img svg { width:60px; height:60px; }
.product-info { flex:1; display:flex; flex-direction:column; }
.product-name { font-size:15px; font-weight:600; color:#222835; margin-bottom:4px; }
.product-desc { font-size:12px; color:#939CAB; line-height:1.5; margin-bottom:2px; }
.product-stock { font-size:12px; color:#B0B8C8; margin-bottom:8px; }
.product-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
.product-price { display:flex; align-items:center; gap:4px; font-family:Inter,sans-serif; font-size:18px; font-weight:700; color:#FF9D19; }
.product-price svg { width:18px; height:18px; }
.btn-exchange { height:32px; padding:0 16px; border-radius:6px; border:none; font-size:13px; font-weight:600; color:#fff; background:#3F68F5; cursor:pointer; }
.btn-exchanged { height:32px; padding:0 12px; border-radius:6px; border:1px solid #3F68F5; font-size:13px; font-weight:600; color:#3F68F5; background:#fff; cursor:pointer; }

/* Dialog overlay */
.dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:60; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.dialog-overlay.show { opacity:1; pointer-events:auto; }
.dialog-box { background:#fff; border-radius:14px; width:280px; overflow:hidden; transform:scale(0.9); transition:transform 0.25s; }
.dialog-overlay.show .dialog-box { transform:scale(1); }
.dialog-body { padding:28px 24px 20px; text-align:center; font-size:15px; color:#222835; line-height:1.6; }
.dialog-actions { display:flex; border-top:1px solid #F2F3F5; }
.dialog-actions button { flex:1; padding:14px; font-size:15px; border:none; background:none; cursor:pointer; }
.dialog-actions button:first-child { color:#939CAB; border-right:1px solid #F2F3F5; }
.dialog-actions button:last-child { color:#3F86F5; font-weight:600; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">9:41</span>
  <div style="display:flex;gap:5px;align-items:center;">
    <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#222835"/><rect x="4" y="4" width="3" height="6" rx="0.5" fill="#222835"/><rect x="8" y="2" width="3" height="8" rx="0.5" fill="#222835"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="#222835"/></svg>
    <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2" fill="none" stroke="#222835"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#222835"/><rect x="20" y="3" width="1.5" height="4" rx="0.5" fill="#222835"/></svg>
  </div>
</div>

<div class="nav-bar">
  <span class="back">&#8249;</span>
  <span class="title">积分兑换</span>
  <div class="capsule">
    <div class="capsule-dots"><span></span><span></span><span></span></div>
    <div class="capsule-divider"></div>
    <div class="capsule-close"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#222835" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div>
  </div>
</div>

<!-- Banner -->
<div class="banner">
  <img src="banner-exchange.png" alt="积分当钱花 好物换不停" onerror="this.parentElement.style.background='linear-gradient(135deg,#FF9D19,#FF6D00)';this.parentElement.style.height='140px';this.style.display='none';">
</div>

<!-- Info bar -->
<div class="info-bar">
  <span class="community">景云社区 <svg width="10" height="6" viewBox="0 0 10 6" fill="#939CAB"><path d="M0 0l5 6 5-6z"/></svg></span>
  <span class="record-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h4"/></svg> 兑换记录</span>
</div>
<div class="balance-row">
  <span class="balance-label">我的积分余额：</span>
  <span class="balance-value">260</span>
  <button class="btn-earn" onclick="void(0)">去赚积分</button>
</div>

<!-- Promo -->
<div class="promo-bar">更多好物不断上架中.....</div>

<!-- Product list -->
<div class="product-list">

  <div class="product-card">
    <div class="product-img">
      <svg viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="10" fill="#EBF5FF"/><path d="M30 70V40a5 5 0 015-5h10v-5a10 10 0 0110 0v5h10a5 5 0 015 5v30a5 5 0 01-5 5H35a5 5 0 01-5-5z" fill="#3F86F5" opacity="0.2"/><path d="M42 50h16M50 42v16" stroke="#3F86F5" stroke-width="2.5" stroke-linecap="round"/></svg>
    </div>
    <div class="product-info">
      <div class="product-name">活力28洗衣液</div>
      <div class="product-desc">1包（90抽/180张）</div>
      <div class="product-stock">库存数量 99</div>
      <div class="product-bottom">
        <span class="product-price"><svg viewBox="0 0 24 24" fill="#FF9D19"><path d="M12 2l3 6h6l-5 4 2 6-6-4-6 4 2-6-5-4h6z"/></svg>200</span>
        <button class="btn-exchange" onclick="tryExchange(200)">兑换</button>
      </div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <svg viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="10" fill="#FFF3E2"/><circle cx="50" cy="45" r="20" fill="#FF9D19" opacity="0.2"/><path d="M50 30l6 12h13l-10 8 4 12-13-9-13 9 4-12-10-8h13z" fill="#FF9D19" opacity="0.4"/></svg>
    </div>
    <div class="product-info">
      <div class="product-name">活力28洗衣液</div>
      <div class="product-desc">活力28洗衣液1kg/瓶</div>
      <div class="product-stock">库存数量 99</div>
      <div class="product-bottom">
        <span class="product-price"><svg viewBox="0 0 24 24" fill="#FF9D19"><path d="M12 2l3 6h6l-5 4 2 6-6-4-6 4 2-6-5-4h6z"/></svg>800</span>
        <button class="btn-exchange" onclick="tryExchange(800)">兑换</button>
      </div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <svg viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="10" fill="#E9FAF1"/><rect x="25" y="30" width="50" height="40" rx="6" fill="#34C96E" opacity="0.2"/><path d="M40 50l7 7 13-14" stroke="#34C96E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="product-info">
      <div class="product-name">清风抽纸</div>
      <div class="product-desc">3层 130抽 大包装</div>
      <div class="product-stock">库存数量 50</div>
      <div class="product-bottom">
        <span class="product-price"><svg viewBox="0 0 24 24" fill="#FF9D19"><path d="M12 2l3 6h6l-5 4 2 6-6-4-6 4 2-6-5-4h6z"/></svg>500</span>
        <button class="btn-exchange" onclick="tryExchange(500)">兑换</button>
      </div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-img">
      <svg viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="10" fill="#F0EEFF"/><circle cx="50" cy="50" r="22" fill="#757AF1" opacity="0.15"/><path d="M40 55a10 10 0 0120 0" stroke="#757AF1" stroke-width="2.5" stroke-linecap="round"/><circle cx="43" cy="45" r="2.5" fill="#757AF1"/><circle cx="57" cy="45" r="2.5" fill="#757AF1"/></svg>
    </div>
    <div class="product-info">
      <div class="product-name">社区定制环保袋</div>
      <div class="product-desc">可折叠便携款</div>
      <div class="product-stock">库存数量 30</div>
      <div class="product-bottom">
        <span class="product-price"><svg viewBox="0 0 24 24" fill="#FF9D19"><path d="M12 2l3 6h6l-5 4 2 6-6-4-6 4 2-6-5-4h6z"/></svg>300</span>
        <button class="btn-exchange" onclick="tryExchange(300)">兑换</button>
      </div>
    </div>
  </div>

</div>

<!-- Dialog: 积分不足 -->
<div class="dialog-overlay" id="dialogOverlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog-box">
    <div class="dialog-body">您的积分不够，先去赚积分吧</div>
    <div class="dialog-actions">
      <button onclick="closeDialog()">取消</button>
      <button onclick="closeDialog()">去赚积分</button>
    </div>
  </div>
</div>

<script>
var userPoints = 260;

function tryExchange(cost) {
  if (userPoints < cost) {
    document.getElementById('dialogOverlay').classList.add('show');
  }
}

function closeDialog() {
  document.getElementById('dialogOverlay').classList.remove('show');
}
</script>

</body>
</html>
