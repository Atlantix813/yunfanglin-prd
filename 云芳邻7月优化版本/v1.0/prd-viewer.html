<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云芳邻 7月优化版本 PRD</title>
  <style>
    :root {
      --blue: #2f8cff;
      --blue-dark: #1d6ee8;
      --blue-weak: #eaf4ff;
      --green: #16b36a;
      --green-bg: #eaf9f1;
      --orange: #f59e0b;
      --orange-bg: #fff5df;
      --red: #ef4444;
      --red-bg: #fff1f1;
      --text: #1f2937;
      --sub: #4b5563;
      --muted: #8a94a6;
      --line: #e5e7eb;
      --bg: #f5f7fb;
      --card: #ffffff;
      --soft: #f8fafc;
      --shadow: 0 14px 40px rgba(15, 23, 42, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 74px 1fr;
      overflow: hidden;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      min-width: 0;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2f8cff, #63b3ff);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: none;
    }

    .title {
      min-width: 0;
    }

    .title strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
    }

    .title span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: #fff;
      color: var(--sub);
    }

    .sidebar-toggle {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #526071;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .sidebar-toggle:hover {
      color: var(--blue);
      border-color: #b9d7ff;
      background: #f7fbff;
    }

    .sidebar-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 252px 1fr;
      overflow: hidden;
    }

    .layout.sidebar-collapsed {
      grid-template-columns: 64px 1fr;
    }

    .sidebar {
      min-height: 0;
      overflow-y: auto;
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 18px 14px;
    }

    .layout.sidebar-collapsed .sidebar {
      padding: 14px 8px;
      overflow-x: hidden;
    }

    .sidebar-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 4px 12px 10px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-menu-title {
      color: #334155;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .sidebar-menu-head .sidebar-toggle {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex: none;
    }

    .layout.sidebar-collapsed .sidebar-menu-head {
      justify-content: center;
      padding: 0 0 10px;
    }

    .layout.sidebar-collapsed .sidebar-menu-title {
      display: none;
    }

    .nav-label {
      color: #a0a9b7;
      font-weight: 800;
      font-size: 12px;
      padding: 8px 10px;
    }

    .layout.sidebar-collapsed .nav-label {
      height: 14px;
      padding: 7px 0;
      color: transparent;
      overflow: hidden;
    }

    .feature-btn {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      color: #425166;
      border-radius: 10px;
      padding: 12px 12px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 10px;
      align-items: start;
    }

    .layout.sidebar-collapsed .feature-btn {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 12px 0;
    }

    .feature-btn:hover {
      background: #f3f7ff;
      color: var(--blue);
    }

    .feature-btn.active {
      background: var(--blue-weak);
      color: var(--blue);
      font-weight: 800;
    }

    .feature-no {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
    }

    .layout.sidebar-collapsed .feature-no {
      margin: 0 auto;
    }

    .feature-btn.active .feature-no {
      background: var(--blue);
      color: #fff;
    }

    .feature-name {
      line-height: 1.45;
      min-width: 0;
    }

    .layout.sidebar-collapsed .feature-name {
      display: none;
    }

    .content {
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .feature-head {
      padding: 18px 22px 14px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }

    .feature-head h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
    }

    .feature-head p {
      margin: 8px 0 0;
      color: var(--sub);
      line-height: 1.7;
      max-width: 1080px;
    }

    .page-tabs {
      min-width: 0;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding: 0 22px;
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .page-tab {
      border: 0;
      background: transparent;
      border-bottom: 3px solid transparent;
      color: #526071;
      padding: 15px 18px 13px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 800;
    }

    .page-tab:hover {
      color: var(--blue);
      background: #f7fbff;
    }

    .page-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      background: #fff;
    }

    .workspace {
      min-height: 0;
      min-width: 0;
      display: grid;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
      height: calc(100vh - 74px - 54px);
    }

    .workspace.pc {
      grid-template-columns: minmax(0, 1fr) minmax(360px, 32%);
    }

    .workspace.mobile {
      grid-template-columns: minmax(390px, 430px) minmax(520px, 1fr);
    }

    .workspace.doc-only {
      grid-template-columns: minmax(0, 1fr);
    }

    .workspace.doc-only .proto-panel {
      display: none;
    }

    .doc-panel,
    .proto-panel {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .doc-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      order: 2;
    }

    .doc-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .doc-head .kicker {
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .doc-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
    }

    .doc-scroll {
      min-height: 0;
      overflow-y: auto;
      padding: 18px 20px 80px;
    }

    .block {
      background: var(--soft);
      border: 1px solid #eef2f7;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .block h3 {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 15px;
    }

    .block p,
    .block li {
      line-height: 1.78;
      color: #38465a;
    }

    .block p {
      margin: 0;
    }

    .block ul,
    .block ol {
      margin: 0;
      padding-left: 20px;
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .table-scroll table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      table-layout: auto;
    }

    .table-scroll th,
    .table-scroll td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      line-height: 1.65;
      color: #38465a;
    }

    .table-scroll th {
      background: #f1f5f9;
      color: #334155;
      font-weight: 800;
      white-space: nowrap;
    }

    .table-scroll tbody tr:last-child td {
      border-bottom: 0;
    }

    .token {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 5px;
      background: #edf5ff;
      color: var(--blue);
      font-weight: 800;
      white-space: nowrap;
    }

    .change-list {
      display: grid;
      gap: 10px;
    }

    .change-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 13px 14px;
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
      align-items: start;
    }

    .tag {
      height: 24px;
      min-width: 42px;
      padding: 0 8px;
      border-radius: 6px;
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
    }

    .add {
      color: var(--green);
      background: var(--green-bg);
    }

    .adjust {
      color: var(--orange);
      background: var(--orange-bg);
    }

    .delete {
      color: var(--red);
      background: var(--red-bg);
    }

    .change-body strong {
      display: block;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .change-body p {
      margin: 0;
      color: #465568;
      line-height: 1.75;
    }

    .change-body ol {
      margin: 0;
      padding-left: 18px;
      color: #465568;
      line-height: 1.75;
    }

    .change-body .rule-groups {
      padding-left: 20px;
    }

    .change-body .rule-groups > li {
      margin-bottom: 8px;
    }

    .change-body .rule-groups > li:last-child {
      margin-bottom: 0;
    }

    .change-body .rule-title {
      display: inline-block;
      margin-bottom: 2px;
      color: #1f2d3d;
      font-weight: 700;
    }

    .change-body .rule-groups ol {
      margin-top: 2px;
      padding-left: 20px;
    }

    .proto-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      background: #f8fafc;
      order: 1;
    }

    .proto-head {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      grid-template-areas:
        "title open";
      gap: 10px 12px;
      align-items: start;
    }

    .proto-head.has-states {
      grid-template-areas:
        "title open"
        "states open";
    }

    .proto-title {
      grid-area: title;
      min-width: 0;
    }

    .proto-title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .proto-title strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }

    .open-btn {
      grid-area: open;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      color: #526071;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 900;
      cursor: pointer;
    }

    .open-btn:hover {
      color: var(--blue);
      border-color: #b9d7ff;
      background: #f7fbff;
    }

    .open-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .state-bar {
      grid-area: states;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      align-items: center;
    }

    .state-bar:empty {
      display: none;
    }

    .state-btn {
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #526071;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .state-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .proto-stage {
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .workspace.mobile .proto-stage {
      align-items: start;
      justify-items: center;
    }

    .pc-stage {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
    }

    .pc-stage iframe {
      display: block;
      border: 0;
      background: #fff;
      transform-origin: top left;
      opacity: 0;
      transition: opacity .16s ease;
    }

    .phone-shell {
      width: 375px;
      height: 812px;
      border-radius: 30px;
      border: 1px solid #d6dde8;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, .14);
      transform-origin: top center;
    }

    .phone-shell iframe {
      width: 375px;
      height: 812px;
      border: 0;
      display: block;
      background: #fff;
      opacity: 0;
      transition: opacity .16s ease;
    }

    .empty {
      color: var(--muted);
      line-height: 1.8;
      padding: 20px;
    }

    @media (max-width: 1280px) {
      .layout {
        grid-template-columns: 220px 1fr;
      }

      .layout.sidebar-collapsed {
        grid-template-columns: 64px 1fr;
      }

      .workspace.pc {
        grid-template-columns: minmax(0, 1fr) minmax(340px, 34%);
      }

      .workspace.mobile {
        grid-template-columns: minmax(360px, 400px) minmax(460px, 1fr);
      }
    }
  </style>
</head>

    /* GENERATED_PRD_DATA_END */

    const sectionNav = document.getElementById("sectionNav");
    const featureNav = document.getElementById("featureNav");
    const sectionNavLabel = document.getElementById("sectionNavLabel");
    const featureNavLabel = document.getElementById("featureNavLabel");
    const featureTitle = document.getElementById("featureTitle");
    const featureSummary = document.getElementById("featureSummary");
    const pageTabs = document.getElementById("pageTabs");
    const workspace = document.getElementById("workspace");
    const docKicker = document.getElementById("docKicker");
    const pageTitle = document.getElementById("pageTitle");
    const docScroll = document.getElementById("docScroll");
    const protoKicker = document.getElementById("protoKicker");
    const protoTitle = document.getElementById("protoTitle");
    const protoStage = document.getElementById("protoStage");
    const stateBar = document.getElementById("stateBar");
    const openProto = document.getElementById("openProto");
    const protoHead = document.querySelector(".proto-head");
    const layout = document.querySelector(".layout");
    const content = document.querySelector(".content");
    const sidebarToggle = document.getElementById("sidebarToggle");

    let activeSectionId = SECTION_DATA[0]?.id || null;
    let activeFeatureId = DATA[0].id;
    let activePageId = DATA[0].pages[0].id;
    let activeStateIndex = 0;
    let loadTimer = null;

    const collapseIcon = '<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M10 5v14"></path><path d="M15 9l-3 3 3 3"></path></svg>';
    const expandIcon = '<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M10 5v14"></path><path d="M13 9l3 3-3 3"></path></svg>';

    sectionNavLabel.hidden = SECTION_DATA.length === 0;
    featureNavLabel.textContent = PRD_MODE === "large" ? "功能板块" : "需求说明";

    function refitPrototype() {
      const page = currentPage();
      if (!page || !page.prototype) return;
      page.prototype.kind === "mobile" ? fitMobileFrame() : fitPcFrame();
    }

    function syncSidebarToggle() {
      const collapsed = layout.classList.contains("sidebar-collapsed");
      sidebarToggle.innerHTML = collapsed ? expandIcon : collapseIcon;
      sidebarToggle.title = collapsed ? "展开左侧菜单" : "收起左侧菜单";
      sidebarToggle.setAttribute("aria-label", sidebarToggle.title);
    }

    sidebarToggle.addEventListener("click", () => {
      layout.classList.toggle("sidebar-collapsed");
      syncSidebarToggle();
      setTimeout(refitPrototype, 180);
    });

    function currentSection() {
      return SECTION_DATA.find(item => item.id === activeSectionId);
    }

    function currentFeature() {
      return DATA.find(item => item.id === activeFeatureId) || DATA[0];
    }

    function currentPage() {
      const feature = currentFeature();
      return feature.pages.find(item => item.id === activePageId) || feature.pages[0];
    }

    function abs(url) {
      return new URL(url, window.location.href).href;
    }

    function renderSectionNav() {
      sectionNav.innerHTML = SECTION_DATA.map(section => `
        <button class="feature-btn ${section.id === activeSectionId ? "active" : ""}" data-section="${section.id}">
          <span class="feature-no">${section.no}</span>
          <span class="feature-name">${section.title}</span>
        </button>
      `).join("");

      sectionNav.querySelectorAll(".feature-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeSectionId = btn.dataset.section;
          activeStateIndex = 0;
          renderAll();
        });
      });
    }

    function renderFeatureNav() {
      featureNav.innerHTML = DATA.map(feature => `
        <button class="feature-btn ${!activeSectionId && feature.id === activeFeatureId ? "active" : ""}" data-feature="${feature.id}">
          <span class="feature-no">${feature.no}</span>
          <span class="feature-name">${feature.title}</span>
        </button>
      `).join("");

      featureNav.querySelectorAll(".feature-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const target = DATA.find(item => item.id === btn.dataset.feature);
          if (!target) return;
          activeSectionId = null;
          activeFeatureId = target.id;
          activePageId = target.pages[0].id;
          activeStateIndex = 0;
          renderAll();
        });
      });
    }

    function renderTabs() {
      if (activeSectionId) {
        pageTabs.innerHTML = "";
        return;
      }
      const feature = currentFeature();
      pageTabs.innerHTML = feature.pages.map(page => `
        <button class="page-tab ${page.id === activePageId ? "active" : ""}" data-page="${page.id}">${page.tab}</button>
      `).join("");

      pageTabs.querySelectorAll(".page-tab").forEach(btn => {
        btn.addEventListener("click", () => {
          activePageId = btn.dataset.page;
          activeStateIndex = 0;
          renderAll();
        });
      });
    }

    function renderChangeBody(change) {
      if (change.groups) {
        return `<ol class="rule-groups">${change.groups.map(group => `
          <li>
            <span class="rule-title">${group.title}</span>
            <ol>${group.items.map(item => `<li>${item}</li>`).join("")}</ol>
          </li>
        `).join("")}</ol>`;
      }
      if (change.list) {
        return `<ol>${change.list.map(item => `<li>${item}</li>`).join("")}</ol>`;
      }
      return `<p>${change.desc}</p>`;
    }

    function renderDoc() {
      const section = currentSection();
      if (section) {
        featureTitle.textContent = section.title;
        featureSummary.textContent = section.summary;
        docKicker.textContent = "基础内容";
        pageTitle.textContent = section.title;
        docScroll.innerHTML = section.blocks.map(block => `
          <div class="block">
            <h3>${block.title}</h3>
            ${block.html || `<ul>${(block.list || []).map(item => `<li>${item}</li>`).join("")}</ul>`}
          </div>
        `).join("");
        docScroll.scrollTop = 0;
        return;
      }

      const feature = currentFeature();
      const page = currentPage();
      featureTitle.textContent = feature.title;
      featureSummary.textContent = feature.summary;
      const kickerMap = {
        pc: "PC端页面需求",
        mobile: "移动端页面需求",
        message: "订阅消息需求",
        task: "定时任务需求",
        table: "底表设计需求"
      };
      docKicker.textContent = kickerMap[page.type] || "需求说明";
      pageTitle.textContent = page.title;

      const changes = page.changes || [];
      const changeHtml = changes.length ? changes.map(change => {
        const body = renderChangeBody(change);
        return `
          <div class="change-item">
            <span class="tag ${change.type}">${change.label}</span>
            <div class="change-body">
              <strong>${change.title}</strong>
              ${body}
            </div>
          </div>
        `;
      }).join("") : `<p class="empty">待补充。</p>`;

      const notes = page.notes && page.notes.length
        ? `<div class="block"><h3>补充说明</h3><ul>${page.notes.map(item => `<li>${item}</li>`).join("")}</ul></div>`
        : "";

      const detailBlocks = (page.blocks || []).map(block => `
        <div class="block">
          <h3>${block.title}</h3>
          ${block.html}
        </div>
      `).join("");

      docScroll.innerHTML = `
        <div class="block">
          <h3>页面位置</h3>
          <p>${page.location}</p>
        </div>
        <div class="block">
          <h3>本页改动</h3>
          <div class="change-list">${changeHtml}</div>
        </div>
        ${detailBlocks}
        ${notes}
      `;
      docScroll.scrollTop = 0;
    }

    function hideIframeScrollbar(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const style = doc.createElement("style");
        style.textContent = "html, body, * { scrollbar-width: none !important; -ms-overflow-style: none !important; } ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }";
        doc.head.appendChild(style);
      } catch (e) {
        console.warn("skip iframe style", e);
      }
    }

    function runAction(iframe, action) {
      if (!action) return;
      try {
        const win = iframe.contentWindow;
        const fn = win && win[action.fn];
        if (typeof fn === "function") fn.apply(win, action.args || []);
      } catch (e) {
        console.warn("skip iframe action", e);
      }
    }

    function fitPcFrame() {
      const wrap = protoStage.querySelector(".pc-stage");
      const iframe = protoStage.querySelector("iframe");
      if (!wrap || !iframe) return;
      const rect = wrap.getBoundingClientRect();
      let body = null;
      let root = null;
      try {
        const doc = iframe.contentDocument;
        body = doc && doc.body;
        root = doc && doc.documentElement;
      } catch (e) {
        console.warn("skip iframe size inspect", e);
      }
      const baseW = Math.max(
        Number(iframe.dataset.baseW) || 1920,
        body ? body.scrollWidth : 0,
        body ? body.offsetWidth : 0,
        root ? root.scrollWidth : 0,
        root ? root.offsetWidth : 0
      );
      const baseH = Math.max(
        Number(iframe.dataset.baseH) || 1080,
        body ? body.scrollHeight : 0,
        body ? body.offsetHeight : 0,
        root ? root.scrollHeight : 0,
        root ? root.offsetHeight : 0
      );
      const scale = Math.min(rect.width / baseW, rect.height / baseH);
      iframe.style.width = baseW + "px";
      iframe.style.height = baseH + "px";
      iframe.style.transform = `scale(${Math.max(scale, .2).toFixed(4)})`;
    }

    function fitMobileFrame() {
      const shell = protoStage.querySelector(".phone-shell");
      if (!shell) return;
      const rect = protoStage.getBoundingClientRect();
      const scale = Math.min((rect.width - 28) / 375, (rect.height - 28) / 812, 1);
      shell.style.transform = `scale(${Math.max(scale, .52).toFixed(4)})`;
    }

    function renderStateBar(page) {
      const states = page.prototype.states;
      if (!states || states.length <= 1) {
        stateBar.innerHTML = "";
        protoHead.classList.remove("has-states");
        return;
      }
      protoHead.classList.add("has-states");
      stateBar.innerHTML = states.map((state, index) => `
        <button class="state-btn ${index === activeStateIndex ? "active" : ""}" data-index="${index}">${state.label}</button>
      `).join("");

      stateBar.querySelectorAll(".state-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeStateIndex = Number(btn.dataset.index);
          renderPrototype();
        });
      });
    }

    function renderPrototype() {
      if (activeSectionId) {
        workspace.className = "workspace doc-only";
        stateBar.innerHTML = "";
        protoHead.classList.remove("has-states");
        openProto.removeAttribute("href");
        protoStage.innerHTML = "";
        return;
      }

      const page = currentPage();
      const proto = page.prototype;
      if (!proto || !proto.states || !proto.states.length) {
        workspace.className = "workspace doc-only";
        stateBar.innerHTML = "";
        protoHead.classList.remove("has-states");
        openProto.removeAttribute("href");
        protoStage.innerHTML = "";
        return;
      }
      const states = proto.states;
      const state = states[activeStateIndex] || states[0];
      const kind = proto.kind;

      workspace.className = `workspace ${kind === "mobile" ? "mobile" : "pc"}`;
      protoKicker.textContent = kind === "mobile" ? "移动端原型" : "PC端原型";
      protoTitle.textContent = states.length > 1 ? `${proto.title} · ${state.label}` : proto.title;
      openProto.href = abs(state.url);
      renderStateBar(page);

      clearTimeout(loadTimer);
      loadTimer = setTimeout(() => {
        protoStage.innerHTML = "";
        const iframe = document.createElement("iframe");
          iframe.src = abs(state.url);
          iframe.dataset.baseW = String(proto.width || 1920);
          iframe.dataset.baseH = String(proto.height || 1080);
          iframe.onload = () => {
            iframe.style.opacity = "1";
            hideIframeScrollbar(iframe);
          setTimeout(() => runAction(iframe, state.action), 180);
          kind === "mobile" ? fitMobileFrame() : fitPcFrame();
        };

        if (kind === "mobile") {
          const shell = document.createElement("div");
          shell.className = "phone-shell";
          shell.appendChild(iframe);
          protoStage.appendChild(shell);
          requestAnimationFrame(fitMobileFrame);
        } else {
          const wrap = document.createElement("div");
          wrap.className = "pc-stage";
          wrap.appendChild(iframe);
          protoStage.appendChild(wrap);
          requestAnimationFrame(fitPcFrame);
        }
      }, 80);
    }

    function renderAll() {
      renderSectionNav();
      renderFeatureNav();
      renderTabs();
      renderDoc();
      renderPrototype();
      content.scrollTop = 0;
    }

    window.addEventListener("resize", () => {
      refitPrototype();
    });

    syncSidebarToggle();
    renderAll();
  </script>
