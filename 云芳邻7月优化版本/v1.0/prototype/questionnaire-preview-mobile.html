<!DOCTYPE html>
<!-- prototype-states: detail,form -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>问卷预览</title>
  <link rel="stylesheet" href="mobile-components.css">
  <style>
    html, body { width:375px; height:812px; margin:0; overflow:hidden; }
    button, input, textarea { font:inherit; }
    .questionnaire-phone { width:375px; height:812px; overflow:hidden; position:relative; background:#EEF4FD; }
    .questionnaire-nav { --m-nav-bg:#DDEBFF; }
    .questionnaire-scroll { width:375px; height:668px; padding:12px 12px 24px; overflow-y:auto; background:linear-gradient(180deg,#DDEBFF 0,#EDF5FF 270px,#F5F7FB 100%); scrollbar-width:none; }
    .questionnaire-scroll::-webkit-scrollbar { display:none; }
    .questionnaire-preview-tip { min-height:54px; padding:10px 12px; display:flex; align-items:flex-start; gap:10px; border:1px solid #B8D4FA; border-radius:10px; background:#F3F8FF; color:#3C5575; }
    .questionnaire-preview-tip svg { width:20px; height:20px; margin-top:1px; flex:0 0 20px; fill:none; stroke:#2F80ED; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .questionnaire-preview-tip strong { display:block; color:#2479E8; font-size:13px; }
    .questionnaire-preview-tip span { display:block; margin-top:3px; font-size:11px; line-height:16px; }
    .questionnaire-detail-card { margin-top:12px; padding:18px 16px; border-radius:12px; background:#fff; box-shadow:0 4px 14px rgba(50,86,132,.06); }
    .questionnaire-title-row { display:grid; grid-template-columns:36px minmax(0,1fr); gap:10px; align-items:start; }
    .questionnaire-title-icon { width:32px; height:32px; border-radius:50%; display:grid; place-items:center; background:#46D8A5; color:#fff; }
    .questionnaire-title-icon svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .questionnaire-title { padding-top:2px; color:#171A20; font-size:18px; line-height:26px; font-weight:700; }
    .questionnaire-community { margin-top:16px; color:#9097A2; font-size:14px; }
    .questionnaire-divider { height:1px; margin:12px 0 16px; background:#EDF0F4; }
    .questionnaire-info-row { display:grid; grid-template-columns:70px minmax(0,1fr); gap:8px; margin-bottom:14px; align-items:start; color:#626B78; font-size:14px; line-height:22px; }
    .questionnaire-info-row:last-child { margin-bottom:0; }
    .questionnaire-info-label { color:#252B34; font-weight:600; }
    .questionnaire-question-card { margin-top:12px; padding:18px 16px; border-radius:12px; background:#fff; box-shadow:0 4px 14px rgba(50,86,132,.06); }
    .questionnaire-question-heading { color:#272E3B; font-size:17px; font-weight:700; }
    .questionnaire-question-list { margin:14px 0 0; padding:0; list-style:none; color:#3A414C; font-size:15px; line-height:24px; }
    .questionnaire-question-list li { padding:8px 0; border-bottom:1px solid #F3F5F8; }
    .questionnaire-question-list li:last-child { border-bottom:0; }
    .questionnaire-detail-footer { width:375px; height:72px; padding:12px 16px; border-top:1px solid #E5EAF2; background:#fff; }
    .questionnaire-start-btn { width:100%; height:48px; border:0; border-radius:7px; background:#2F80ED; color:#fff; font-size:17px; font-weight:700; box-shadow:0 4px 12px rgba(47,128,237,.22); }

    .questionnaire-form-scroll { height:676px; padding-bottom:28px; }
    .questionnaire-form-card { margin-top:12px; padding:18px 16px 22px; border-radius:12px; background:#fff; box-shadow:0 4px 14px rgba(50,86,132,.06); }
    .questionnaire-field + .questionnaire-field { margin-top:24px; padding-top:22px; border-top:1px solid #F0F2F5; }
    .questionnaire-field-title { display:flex; align-items:flex-start; gap:6px; color:#2B3038; font-size:17px; line-height:24px; }
    .questionnaire-required { color:#F53F3F; font-weight:700; }
    .questionnaire-type-tag { height:24px; margin-right:2px; padding:0 8px; flex:0 0 auto; border:1px solid #2F80ED; border-radius:5px; display:inline-flex; align-items:center; color:#2F80ED; font-size:12px; }
    .questionnaire-textarea { width:100%; height:84px; margin-top:14px; padding:12px; border:1px solid #D8DEE8; border-radius:4px; outline:none; color:#2B3038; line-height:20px; resize:none; }
    .questionnaire-textarea:focus { border-color:#2F80ED; box-shadow:0 0 0 2px rgba(47,128,237,.08); }
    .questionnaire-textarea::placeholder { color:#C9CDD4; }
    .questionnaire-options { margin-top:14px; display:grid; gap:14px; }
    .questionnaire-option { min-height:32px; display:flex; align-items:center; gap:10px; color:#3D444E; font-size:16px; cursor:pointer; }
    .questionnaire-option input { position:absolute; opacity:0; pointer-events:none; }
    .questionnaire-radio { width:22px; height:22px; flex:0 0 22px; border:1.5px solid #C9CDD4; border-radius:50%; position:relative; }
    .questionnaire-option input:checked + .questionnaire-radio { border-color:#2F80ED; }
    .questionnaire-option input:checked + .questionnaire-radio::after { content:''; position:absolute; inset:5px; border-radius:50%; background:#2F80ED; }
    .questionnaire-preview-footer { width:375px; height:64px; padding:10px 16px; border-top:1px solid #E5EAF2; display:flex; align-items:center; justify-content:center; gap:8px; background:#fff; color:#64748A; font-size:13px; }
    .questionnaire-preview-footer svg { width:20px; height:20px; fill:none; stroke:#2F80ED; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .questionnaire-phone [hidden] { display:none; }
  </style>
</head>
<body class="yfl-c-root is-blue-nav">
  <div class="m-phone-screen questionnaire-phone">
    <div class="m-status-bar">
      <span class="time">15:12</span>
      <div class="m-status-icons" aria-hidden="true">
        <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect x="0" y="7" width="2.5" height="3" rx=".5"/><rect x="4" y="5" width="2.5" height="5" rx=".5"/><rect x="8" y="2.5" width="2.5" height="7.5" rx=".5"/><rect x="12" y="0" width="2.5" height="10" rx=".5"/></svg>
        <svg width="23" height="10" viewBox="0 0 23 10" fill="none"><rect x=".5" y=".5" width="19" height="9" rx="2" stroke="currentColor"/><rect x="2.5" y="2.5" width="15" height="5" rx="1" fill="currentColor"/><path d="M21 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="m-nav-bar questionnaire-nav">
      <button class="back" id="backBtn" aria-label="返回">‹</button>
      <span class="title" id="navTitle">问卷详情</span>
      <div class="capsule" aria-label="小程序菜单"><div class="capsule-dots"><span></span><span></span><span></span></div><div class="capsule-divider"></div><div class="capsule-close"><span class="capsule-target"></span></div></div>
    </div>

    <main class="questionnaire-scroll" id="detailPage">
      <section class="questionnaire-preview-tip">
        <svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>
        <div><strong>预览模式</strong><span>当前问卷处于待发布状态，仅供内部检查。</span></div>
      </section>

      <section class="questionnaire-detail-card">
        <div class="questionnaire-title-row">
          <span class="questionnaire-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h12a4 4 0 0 1 4 4v3a4 4 0 0 1-4 4H9l-5 4v-4a4 4 0 0 1-2-3.5V9a4 4 0 0 1 2-4Z"></path><path d="M8 9h7M8 12h4"></path></svg></span>
          <div class="questionnaire-title">测试一下想要预览有什么效果</div>
        </div>
        <div class="questionnaire-community">白云区</div>
        <div class="questionnaire-divider"></div>
        <div class="questionnaire-info-row"><span class="questionnaire-info-label">开放时间</span><span>2026-07-15 00:00:00 至<br>2026-07-17 00:00:00</span></div>
        <div class="questionnaire-info-row"><span class="questionnaire-info-label">问卷说明</span><span>1234</span></div>
      </section>

      <section class="questionnaire-question-card">
        <div class="questionnaire-question-heading">问卷问题</div>
        <ol class="questionnaire-question-list"><li>1、问题1</li><li>2、问题2</li></ol>
      </section>
    </main>

    <footer class="questionnaire-detail-footer" id="detailFooter"><button class="questionnaire-start-btn" id="startBtn">开始作答</button></footer>

    <main class="questionnaire-scroll questionnaire-form-scroll" id="formPage" hidden>
      <section class="questionnaire-preview-tip">
        <svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>
        <div><strong>预览填写</strong><span>可检查题目和选项，当前内容不会形成答卷。</span></div>
      </section>

      <section class="questionnaire-form-card">
        <div class="questionnaire-field">
          <div class="questionnaire-field-title"><span class="questionnaire-required">*</span><span>1、问题1</span></div>
          <textarea class="questionnaire-textarea" placeholder="请输入"></textarea>
        </div>
        <div class="questionnaire-field">
          <div class="questionnaire-field-title"><span class="questionnaire-type-tag">单选</span><span class="questionnaire-required">*</span><span>2、问题2</span></div>
          <div class="questionnaire-options">
            <label class="questionnaire-option"><input type="radio" name="question2"><span class="questionnaire-radio"></span><span>答案1</span></label>
            <label class="questionnaire-option"><input type="radio" name="question2"><span class="questionnaire-radio"></span><span>答案2</span></label>
          </div>
        </div>
      </section>
    </main>

    <footer class="questionnaire-preview-footer" id="formFooter" hidden>
      <svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>
      <span>预览模式，填写内容不会保存</span>
    </footer>
  </div>

  <script src="mobile-components.js"></script>
  <script>
    (function () {
      const detailPage = document.getElementById('detailPage');
      const formPage = document.getElementById('formPage');
      const detailFooter = document.getElementById('detailFooter');
      const formFooter = document.getElementById('formFooter');
      const navTitle = document.getElementById('navTitle');

      function showDetail() {
        detailPage.hidden = false;
        detailFooter.hidden = false;
        formPage.hidden = true;
        formFooter.hidden = true;
        navTitle.textContent = '问卷详情';
      }

      function showForm() {
        detailPage.hidden = true;
        detailFooter.hidden = true;
        formPage.hidden = false;
        formFooter.hidden = false;
        navTitle.textContent = '问卷填写';
      }

      document.getElementById('startBtn').addEventListener('click', showForm);
      document.getElementById('backBtn').addEventListener('click', () => {
        if (!formPage.hidden) showDetail();
      });

      if (new URLSearchParams(location.search).get('state') === 'form') showForm();
      else showDetail();
    }());
  </script>
</body>
</html>
